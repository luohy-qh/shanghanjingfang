  {id:200, name:"栝楼桂枝汤", category:"金匮要略-痉湿暍病", composition:[{drug:"瓜蒌根",dose:"二两"},{drug:"桂枝",dose:"三两"},{drug:"芍药",dose:"三两"},{drug:"甘草",dose:"二两"},{drug:"生姜",dose:"三两"},{drug:"大枣",dose:"十二枚"}], method:"以水九升，煮取三升，分温三服，取微汗。", original:"太阳病，其证备，身体强，几几然，脉反沉迟，此为痉，栝楼桂枝汤主之。（痉湿暍病篇）", keyPoints:["柔润筋脉、解肌止痉。","瓜蒌根生津润燥、滋养筋脉，桂枝汤调和营卫。","为太阳病津液不足、筋脉失养而致痉的治法。","与葛根汤区别：彼为实邪无汗，此为津伤有汗。","脉沉迟为津液不足。"]},
  {id:201, name:"葛根汤(金匮)", category:"金匮要略-痉湿暍病", composition:[{drug:"葛根",dose:"四两"},{drug:"麻黄",dose:"三两（去节）"},{drug:"桂枝",dose:"二两（去皮）"},{drug:"芍药",dose:"二两"},{drug:"甘草",dose:"二两（炙）"},{drug:"生姜",dose:"三两"},{drug:"大枣",dose:"十二枚"}], method:"以水一斗，先煮麻黄、葛根，减二升，去白沫，内诸药，煮取三升。", original:"太阳病，无汗而小便反少，气上冲胸，口噤不得语，欲作刚痉，葛根汤主之。（痉湿暍病篇）", keyPoints:["发汗解表、升津舒筋。","葛根升津液、舒筋脉，麻黄发汗解表。","为刚痉初起、无汗、小便少的治法。","口噤不得语为阳明经筋急。","与栝楼桂枝汤区别：彼为柔痉、此为刚痉。"]},
  {id:202, name:"麻黄加术汤", category:"金匮要略-痉湿暍病", composition:[{drug:"麻黄",dose:"三两（去节）"},{drug:"桂枝",dose:"二两（去皮）"},{drug:"甘草",dose:"一两（炙）"},{drug:"杏仁",dose:"七十个（去皮尖）"},{drug:"白术",dose:"四两"}], method:"以水九升，先煮麻黄，减二升，去上沫，内诸药，煮取二升半。", original:"湿家身烦疼，可与麻黄加术汤发其汗为宜。（痉湿暍病篇）", keyPoints:["发汗解表、散寒除湿。","麻黄汤发汗解表，加白术健脾祛湿。","为寒湿在表、身烦疼的治法。","白术量重（四两），意在走表祛湿。","麻黄得术、虽发汗不致过汗；术得麻黄、能行表里之湿。"]},
  {id:203, name:"麻黄杏仁薏苡甘草汤", category:"金匮要略-痉湿暍病", composition:[{drug:"麻黄",dose:"半两（去节，汤泡）"},{drug:"杏仁",dose:"十个（去皮尖）"},{drug:"薏苡仁",dose:"半两"},{drug:"甘草",dose:"一两（炙）"}], method:"剉麻豆大，每服四钱匕，水盏半，煮八分，去滓，温服。", original:"病者一身尽疼，发热，日晡所剧者，名风湿，此病伤于汗出当风。（痉湿暍病篇）", keyPoints:["解表祛湿、清热宣痹。","麻黄杏仁解表宣肺，薏苡仁清热祛湿。","为风湿在表、一身尽疼的治法。","日晡所剧为湿邪化热。","麻黄量小（半两）、取微汗。"]},
  {id:204, name:"防己黄芪汤", category:"金匮要略-痉湿暍病", composition:[{drug:"防己",dose:"一两"},{drug:"黄芪",dose:"一两一分"},{drug:"白术",dose:"三分"},{drug:"甘草",dose:"半两（炙）"},{drug:"生姜",dose:"四片"},{drug:"大枣",dose:"一枚"}], method:"上剉麻豆大，每抄五钱匕，生姜四片，大枣一枚，水盏半，煎八分，去滓，温服。", original:"风湿，脉浮，身重，汗出恶风者，防己黄芪汤主之。（痉湿暍病篇）", keyPoints:["益气固表、利水祛湿。","黄芪益气固表，防己利水祛湿，白术健脾。","为风湿表虚、汗出恶风的治法。","服后如虫行皮中为卫阳振奋、驱湿下行。","临床用于风湿性关节炎、肥胖、水肿。"]},
  {id:205, name:"桂枝附子汤", category:"金匮要略-痉湿暍病", composition:[{drug:"桂枝",dose:"四两（去皮）"},{drug:"生姜",dose:"三两（切）"},{drug:"附子",dose:"三枚（炮，去皮）"},{drug:"甘草",dose:"二两（炙）"},{drug:"大枣",dose:"十二枚（擘）"}], method:"以水六升，煮取二升，去滓，分温三服。", original:"伤寒八九日，风湿相搏，身体疼烦，不能自转侧，脉浮虚而涩者，桂枝附子汤主之。（痉湿暍病篇）", keyPoints:["温经散寒、祛风除湿。","桂枝汤去芍药加附子，温经散寒止痛。","为风湿相搏、阳气虚衰的治法。","脉浮虚而涩为阳虚风湿。","附子用三枚，量大、温阳力宏。"]},
  {id:206, name:"白术附子汤", category:"金匮要略-痉湿暍病", composition:[{drug:"白术",dose:"二两"},{drug:"附子",dose:"一枚半（炮，去皮）"},{drug:"甘草",dose:"一两（炙）"},{drug:"生姜",dose:"一两半（切）"},{drug:"大枣",dose:"六枚"}], method:"以水三升，煮取一升，去滓，分温三服。", original:"若大便坚，小便自利者，去桂加白术汤主之。（痉湿暍病篇）", keyPoints:["健脾祛湿、温经止痛。","白术健脾祛湿，附子温经散寒。","为风湿在表、湿重阳虚的治法。","服后如冒状为术附并走皮中、逐水气的反应。","与桂枝附子汤区别：彼为表阳虚、此为湿重。"]},
  {id:207, name:"甘草附子汤", category:"金匮要略-痉湿暍病", composition:[{drug:"甘草",dose:"二两（炙）"},{drug:"白术",dose:"二两"},{drug:"附子",dose:"二枚（炮，去皮）"},{drug:"桂枝",dose:"四两（去皮）"}], method:"以水六升，煮取三升，去滓，温服一升，日三服。", original:"风湿相搏，骨节疼烦，掣痛不得屈伸，汗出短气，小便不利，甘草附子汤主之。（痉湿暍病篇）", keyPoints:["温阳散寒、祛湿止痛。","桂枝温经散寒，白术健脾祛湿，附子温阳。","为风湿俱盛、阳气虚衰的治法。","掣痛不得屈伸为风湿深入骨节。","三附子汤皆治阳虚风湿，临床须辨证选用。"]},
  {id:208, name:"白虎加人参汤(金匮)", category:"金匮要略-痉湿暍病", composition:[{drug:"知母",dose:"六两"},{drug:"石膏",dose:"一斤（碎）"},{drug:"甘草",dose:"二两"},{drug:"粳米",dose:"六合"},{drug:"人参",dose:"三两"}], method:"以水一斗，煮米熟汤成，去滓，温服一升。", original:"太阳中热者，暍是也。汗出恶寒，身热而渴，白虎加人参汤主之。（痉湿暍病篇）", keyPoints:["清热生津、益气养阴。","白虎汤清热，人参益气生津。","为暑热伤气、津液不足的治法。","汗出恶寒为暑热伤气、卫外不固。","临床用于暑热、热病气津两伤。"]},
  {id:209, name:"一物瓜蒂汤", category:"金匮要略-痉湿暍病", composition:[{drug:"瓜蒂",dose:"二十个"}], method:"剉，以水一升，煮取五合，去滓，顿服。", original:"太阳中暍，身热疼重，而脉微弱，此以夏月伤冷水，水行皮中所致也。（痉湿暍病篇）", keyPoints:["祛湿散水。","瓜蒂涌吐、祛水湿。","为暑月伤湿、水行皮中的治法。","身热疼重为湿郁肌表。","脉微弱为暑伤气。"]},
  {id:210, name:"百合知母汤", category:"金匮要略-百合狐惑阴阳毒病", composition:[{drug:"百合",dose:"七枚（擘）"},{drug:"知母",dose:"三两（切）"}], method:"先以水洗百合，渍一宿，去其水，更以泉水二升，煎取一升。", original:"百合病，发汗后者，百合知母汤主之。（百合狐惑阴阳毒病篇）", keyPoints:["润肺清心、安神定志。","百合润肺清心，知母清热滋阴。","为百合病误汗后、津液受伤的治法。","用泉水煎药，取其甘寒清热。"]},
  {id:211, name:"滑石代赭汤", category:"金匮要略-百合狐惑阴阳毒病", composition:[{drug:"百合",dose:"七枚（擘）"},{drug:"滑石",dose:"三两（碎，绵裹）"},{drug:"代赭石",dose:"一枚（如弹丸大，碎）"}], method:"先以水洗百合，渍一宿，去其水，更以泉水二升，煎取一升。", original:"百合病，下之后者，滑石代赭汤主之。（百合狐惑阴阳毒病篇）", keyPoints:["清肺利水、降逆和胃。","百合润肺清心，滑石清热利水，代赭石重镇降逆。","为百合病误下后、津伤气逆的治法。"]},
  {id:212, name:"百合鸡子汤", category:"金匮要略-百合狐惑阴阳毒病", composition:[{drug:"百合",dose:"七枚（擘）"},{drug:"鸡子黄",dose:"一枚"}], method:"先以水洗百合，渍一宿，去其水，更以泉水二升，煎取一升，内鸡子黄，搅匀。", original:"百合病，吐之后者，百合鸡子汤主之。（百合狐惑阴阳毒病篇）", keyPoints:["润肺清心、养血安神。","百合润肺清心，鸡子黄养血滋阴、安神。","为百合病误吐后、阴液受伤的治法。"]},
  {id:213, name:"百合地黄汤", category:"金匮要略-百合狐惑阴阳毒病", composition:[{drug:"百合",dose:"七枚（擘）"},{drug:"生地黄汁",dose:"一升"}], method:"先以水洗百合，渍一宿，去其水，更以泉水二升，煎取一升，内地黄汁，煎取一升五合，分温再服。", original:"百合病，不经吐、下、发汗，病形如初者，百合地黄汤主之。（百合狐惑阴阳毒病篇）", keyPoints:["润肺清心、凉血养阴。","百合润肺清心、生地黄汁凉血养阴。","为百合病正治之主方。","服后大便如漆为地黄汁之色。"]},
  {id:214, name:"百合洗方", category:"金匮要略-百合狐惑阴阳毒病", composition:[{drug:"百合",dose:"一升"}], method:"以水一斗，渍之一宿，以洗身。洗已，食煮饼，勿以盐豉也。", original:"百合病一月不解，变成渴者，百合洗方主之。（百合狐惑阴阳毒病篇）", keyPoints:["润肺清心、外洗皮腠。","百合渍水洗身，取皮毛与肺合之意。","为百合病经久变渴的治法。"]},
  {id:215, name:"栝楼牡蛎散", category:"金匮要略-百合狐惑阴阳毒病", composition:[{drug:"瓜蒌根",dose:"等分"},{drug:"牡蛎",dose:"等分（熬）"}], method:"为细末，饮服方寸匕，日三服。", original:"百合病，渴不差者，栝楼牡蛎散主之。（百合狐惑阴阳毒病篇）", keyPoints:["生津止渴、潜阳敛阴。","瓜蒌根生津止渴，牡蛎潜阳敛阴。","为百合病口渴不止的治法。"]},
  {id:216, name:"甘草泻心汤(金匮)", category:"金匮要略-百合狐惑阴阳毒病", composition:[{drug:"甘草",dose:"四两（炙）"},{drug:"黄芩",dose:"三两"},{drug:"干姜",dose:"三两"},{drug:"半夏",dose:"半升"},{drug:"黄连",dose:"一两"},{drug:"大枣",dose:"十二枚"}], method:"以水一斗，煮取六升，去滓，再煎取三升，温服一升。", original:"狐惑之为病，状如伤寒……蚀于上部则声喝，甘草泻心汤主之。（百合狐惑阴阳毒病篇）", keyPoints:["清热燥湿、解毒安中。","甘草重用清热解毒，黄芩黄连清热燥湿。","为狐惑病蚀于上部的治法。","临床用于白塞氏病、口腔溃疡。"]},
  {id:217, name:"苦参汤", category:"金匮要略-百合狐惑阴阳毒病", composition:[{drug:"苦参",dose:"一升"}], method:"以水一斗，煎取七升，去滓，熏洗，日三服。", original:"蚀于下部则咽干，苦参汤洗之。（百合狐惑阴阳毒病篇）", keyPoints:["清热燥湿、杀虫解毒。","苦参一味，煎汤外洗。","为狐惑病蚀于下部的治法。"]},
  {id:218, name:"雄黄熏方", category:"金匮要略-百合狐惑阴阳毒病", composition:[{drug:"雄黄",dose:"一味"}], method:"为末，筒瓦二枚合之，烧，向肛熏之。", original:"蚀于肛者，雄黄熏之。（百合狐惑阴阳毒病篇）", keyPoints:["解毒杀虫、燥湿止痒。","雄黄一味，烧烟熏肛。","为狐惑病蚀于肛门的治法。"]},
  {id:219, name:"赤小豆当归散", category:"金匮要略-百合狐惑阴阳毒病", composition:[{drug:"赤小豆",dose:"三升（浸，令芽出）"},{drug:"当归",dose:"三两"}], method:"杵为散，浆水服方寸匕，日三服。", original:"病者脉数，无热，微烦，默默但欲卧，汗出……若能食者，脓已成也，赤小豆当归散主之。（百合狐惑阴阳毒病篇）", keyPoints:["清热利湿、排脓活血。","赤小豆利湿排脓，当归活血祛瘀。","为狐惑病成脓的治法。"]},
  {id:220, name:"升麻鳖甲汤", category:"金匮要略-百合狐惑阴阳毒病", composition:[{drug:"升麻",dose:"二两"},{drug:"当归",dose:"一两"},{drug:"蜀椒",dose:"一两（炒去汗）"},{drug:"甘草",dose:"二两"},{drug:"雄黄",dose:"半两（研）"},{drug:"鳖甲",dose:"一片（炙）"}], method:"以水四升，煮取一升，顿服之。", original:"阳毒之为病，面赤斑斑如锦纹，咽喉痛，唾脓血，升麻鳖甲汤主之。（百合狐惑阴阳毒病篇）", keyPoints:["清热解毒、散瘀利咽。","升麻清热解毒，鳖甲滋阴散瘀，雄黄解毒。","为阳毒病的治法。","五日可治、七日不可治强调早期治疗。"]},
  {id:221, name:"甘草汤(金匮)", category:"金匮要略-百合狐惑阴阳毒病", composition:[{drug:"甘草",dose:"二两"}], method:"以水三升，煮取一升半，去滓，温服七合。", original:"少阴病二三日，咽痛者，可与甘草汤。（百合狐惑阴阳毒病篇）", keyPoints:["清热解毒、利咽止痛。","生甘草一味，清热解毒。","为少阴咽痛的轻证治法。"]},
  {id:222, name:"白虎加桂枝汤", category:"金匮要略-疟病", composition:[{drug:"知母",dose:"六两"},{drug:"甘草",dose:"二两（炙）"},{drug:"石膏",dose:"一斤"},{drug:"粳米",dose:"二合"},{drug:"桂枝",dose:"三两（去皮）"}], method:"剉，每五钱，水一盏半，煎至八分，去滓，温服，汗出愈。", original:"温疟者，其脉如平，身无寒但热，骨节疼烦，时呕，白虎加桂枝汤主之。（疟病篇）", keyPoints:["清热生津、解表散邪。","白虎汤清热生津，桂枝解表散邪。","为温疟但热不寒、骨节疼烦的治法。","时呕为热扰胃气。"]},
  {id:223, name:"蜀漆散", category:"金匮要略-疟病", composition:[{drug:"蜀漆",dose:"（洗去腥）"},{drug:"云母",dose:"（烧二日夜）"},{drug:"龙骨",dose:"等分"}], method:"杵为散，未发前以浆水服半钱匕。", original:"疟多寒者，名曰牡疟，蜀漆散主之。（疟病篇）", keyPoints:["祛痰截疟、镇惊安神。","蜀漆（常山苗）祛痰截疟，云母龙骨重镇安神。","为牡疟多寒的治法。","未发前服、取先安未受邪之地。"]},
  {id:224, name:"鳖甲煎丸", category:"金匮要略-疟病", composition:[{drug:"鳖甲",dose:"十二分（炙）"},{drug:"乌扇",dose:"三分（烧）"},{drug:"黄芩",dose:"三分"},{drug:"柴胡",dose:"六分"},{drug:"鼠妇",dose:"三分（熬）"},{drug:"干姜",dose:"三分"},{drug:"大黄",dose:"三分"},{drug:"芍药",dose:"五分"},{drug:"桂枝",dose:"三分"},{drug:"葶苈",dose:"一分（熬）"},{drug:"石韦",dose:"三分"},{drug:"厚朴",dose:"三分"},{drug:"牡丹",dose:"五分"},{drug:"瞿麦",dose:"二分"},{drug:"紫葳",dose:"三分"},{drug:"半夏",dose:"一分"},{drug:"人参",dose:"一分"},{drug:"䗪虫",dose:"五分"},{drug:"阿胶",dose:"三分"},{drug:"蜂窠",dose:"四分"},{drug:"赤硝",dose:"十二分"},{drug:"蜣螂",dose:"六分"},{drug:"桃仁",dose:"二分"}], method:"取煅灶下灰一斗，清酒一斛五斗，浸灰，候酒尽一半，着鳖甲于中，煮令泛烂如胶漆，绞取汁，内诸药，煎为丸。", original:"病疟，以月一日发，当以十五日愈……如其不差，当云何？师曰：此结为癥瘕，名曰疟母，急治之，宜鳖甲煎丸。（疟病篇）", keyPoints:["行气活血、祛湿化痰、软坚消癥。","鳖甲软坚散结，桃仁大黄活血化瘀，柴胡黄芩和解少阳。","为疟母（疟疾日久形成胁下癥块）的治法。","23味药组成、攻补兼施。"]},
  {id:225, name:"柴胡去半夏加瓜蒌汤", category:"金匮要略-疟病", composition:[{drug:"柴胡",dose:"八两"},{drug:"人参",dose:"三两"},{drug:"黄芩",dose:"三两"},{drug:"甘草",dose:"三两"},{drug:"瓜蒌根",dose:"四两"},{drug:"生姜",dose:"二两"},{drug:"大枣",dose:"十二枚"}], method:"以水一斗二升，煮取六升，去滓，再煎取三升。", original:"疟病发渴者，柴胡去半夏加瓜蒌汤主之。（疟病篇附方）", keyPoints:["和解少阳、生津止渴。","柴胡黄芩和解少阳，瓜蒌根生津止渴。","为疟病津伤口渴的治法。"]},
  {id:226, name:"柴胡桂姜汤", category:"金匮要略-疟病", composition:[{drug:"柴胡",dose:"半斤"},{drug:"桂枝",dose:"三两"},{drug:"干姜",dose:"二两"},{drug:"瓜蒌根",dose:"四两"},{drug:"黄芩",dose:"三两"},{drug:"牡蛎",dose:"二两"},{drug:"甘草",dose:"二两"}], method:"以水一斗二升，煮取六升，去滓，再煎取三升。", original:"疟寒多微有热，或但寒不热，服一剂如神。（疟病篇附方）", keyPoints:["和解少阳、温阳化饮。","柴胡黄芩和解少阳，桂枝干姜温阳化饮。","为疟寒多热少的治法。"]},
  {id:227, name:"侯氏黑散", category:"金匮要略-中风历节", composition:[{drug:"菊花",dose:"四十分"},{drug:"白术",dose:"十分"},{drug:"细辛",dose:"三分"},{drug:"茯苓",dose:"三分"},{drug:"牡蛎",dose:"三分"},{drug:"桔梗",dose:"八分"},{drug:"防风",dose:"十分"},{drug:"人参",dose:"三分"},{drug:"矾石",dose:"三分"},{drug:"黄芩",dose:"五分"},{drug:"当归",dose:"三分"},{drug:"干姜",dose:"三分"},{drug:"芎䓖",dose:"三分"},{drug:"桂枝",dose:"三分"}], method:"杵为散，酒服方寸匕，日一服，冷食六十日止。", original:"侯氏黑散：治大风，四肢烦重，心中恶寒不足者。（中风历节病篇附方）", keyPoints:["清热祛风、化痰通络。","菊花清热平肝，牡蛎潜阳熄风，防风桂枝祛风。","为中风初起、风痰上扰的治法。","冷食助药力、热食则下。"]},
  {id:228, name:"风引汤", category:"金匮要略-中风历节", composition:[{drug:"大黄",dose:"四两"},{drug:"干姜",dose:"四两"},{drug:"龙骨",dose:"四两"},{drug:"桂枝",dose:"三两"},{drug:"甘草",dose:"二两"},{drug:"牡蛎",dose:"二两"},{drug:"寒水石",dose:"六两"},{drug:"滑石",dose:"六两"},{drug:"赤石脂",dose:"六两"},{drug:"白石脂",dose:"六两"},{drug:"紫石英",dose:"六两"},{drug:"石膏",dose:"六两"}], method:"杵，粗筛，以韦囊盛之，取三指撮，井花水三升，煮三沸，温服一升。", original:"风引汤：除热瘫痫。（中风历节病篇附方）", keyPoints:["清热降火、重镇潜阳。","大黄泻热，石膏等清热，龙牡等重镇潜阳。","为热瘫痫的治法。","以石代水煎药、取其重镇沉降。","临床用于高血压中风、癫痫。"]},
  {id:229, name:"防己地黄汤", category:"金匮要略-中风历节", composition:[{drug:"防己",dose:"一分"},{drug:"桂枝",dose:"三分"},{drug:"防风",dose:"三分"},{drug:"甘草",dose:"一分"},{drug:"生地黄",dose:"二斤（蒸）"}], method:"上四味，以酒一杯，渍之一宿，绞取汁，生地黄蒸之如斗米饭久。", original:"防己地黄汤：治病如狂状，妄行，独语不休，无寒热，其脉浮。（中风历节病篇附方）", keyPoints:["滋阴凉血、祛风通络。","生地黄重用滋阴凉血，防己防风桂枝祛风通络。","为血虚风动、如狂妄行的治法。"]},
  {id:230, name:"头风摩散", category:"金匮要略-中风历节", composition:[{drug:"大附子",dose:"一枚（炮）"},{drug:"盐",dose:"等分"}], method:"为散，沐了，以方寸匕，已摩疾上，令药力行。", original:"头风摩散方。（中风历节病篇附方）", keyPoints:["温经散寒、祛风止痛。","附子温经散寒，盐引药入皮肤。","为头风外治的方剂。"]},
  {id:231, name:"桂枝芍药知母汤", category:"金匮要略-中风历节", composition:[{drug:"桂枝",dose:"四两"},{drug:"芍药",dose:"三两"},{drug:"甘草",dose:"二两"},{drug:"麻黄",dose:"二两"},{drug:"生姜",dose:"五两"},{drug:"白术",dose:"五两"},{drug:"知母",dose:"四两"},{drug:"防风",dose:"四两"},{drug:"附子",dose:"二枚（炮）"}], method:"以水七升，煮取二升，温服七合，日三服。", original:"诸肢节疼痛，身体尪羸，脚肿如脱，头眩短气，温温欲吐，桂枝芍药知母汤主之。（中风历节病篇）", keyPoints:["祛风除湿、温经散寒、滋阴清热。","桂枝麻黄防风祛风，附子温经，白术祛湿，知母滋阴。","为风湿历节、化热伤阴的治法。"]},
  {id:232, name:"乌头汤", category:"金匮要略-中风历节", composition:[{drug:"麻黄",dose:"三两"},{drug:"芍药",dose:"三两"},{drug:"黄芪",dose:"三两"},{drug:"甘草",dose:"三两（炙）"},{drug:"川乌",dose:"五枚（蜜煎）"}], method:"以水三升，煮取一升，去滓，内蜜煎中，更煎之，服七合。", original:"病历节，不可屈伸，疼痛，乌头汤主之。（中风历节病篇）", keyPoints:["温经散寒、除湿止痛。","乌头大热、温经散寒止痛，麻黄散寒，黄芪益气，蜜解乌头毒。","为寒湿历节、疼痛不可屈伸的治法。"]},
  {id:233, name:"矾石汤", category:"金匮要略-中风历节", composition:[{drug:"矾石",dose:"二两"}], method:"以浆水一斗五升，煎三五沸，浸脚良。", original:"矾石汤：治脚气冲心。（中风历节病篇附方）", keyPoints:["解毒燥湿、收敛止痒。","矾石一味，煎汤浸脚。","为脚气冲心的外治法。"]},
  {id:234, name:"续命汤", category:"金匮要略-中风历节", composition:[{drug:"麻黄",dose:"三两"},{drug:"桂枝",dose:"三两"},{drug:"当归",dose:"三两"},{drug:"人参",dose:"三两"},{drug:"石膏",dose:"三两"},{drug:"干姜",dose:"三两"},{drug:"甘草",dose:"三两"},{drug:"芎䓖",dose:"一两"},{drug:"杏仁",dose:"四十枚"}], method:"以水一斗，煮取四升，温服一升，当小汗。", original:"《古今录验》续命汤：治中风痱，身体不能自收持。（中风历节病篇附方）", keyPoints:["扶正祛风、清热通络。","麻黄桂枝祛风，石膏清热，人参干姜温中，当归芎䓖养血。","为中风痱的治法。"]},
  {id:235, name:"三黄汤", category:"金匮要略-中风历节", composition:[{drug:"麻黄",dose:"五分"},{drug:"独活",dose:"四分"},{drug:"细辛",dose:"二分"},{drug:"黄芪",dose:"二分"},{drug:"黄芩",dose:"三分"}], method:"以水六升，煮取二升，分温三服。", original:"《千金》三黄汤：治中风手足拘急，百节疼痛。（中风历节病篇附方）", keyPoints:["益气固表、清热祛风。","黄芪益气固表，麻黄独活细辛祛风，黄芩清热。","为中风表虚、风湿化热的治法。"]},
  {id:236, name:"术附汤", category:"金匮要略-中风历节", composition:[{drug:"白术",dose:"二两"},{drug:"附子",dose:"一枚半（炮，去皮）"},{drug:"甘草",dose:"一两（炙）"}], method:"剉，每五钱匕，姜五片，枣一枚，水盏半，煎七成。", original:"近效方术附汤：治风虚头重眩，苦极，不知食味。（中风历节病篇附方）", keyPoints:["温阳祛湿、健脾补中。","白术健脾祛湿，附子温阳散寒。","为脾肾阳虚、风虚头重的治法。"]},
  {id:237, name:"八味丸(肾气丸)", category:"金匮要略-中风历节", composition:[{drug:"干地黄",dose:"八两"},{drug:"山茱萸",dose:"四两"},{drug:"薯蓣",dose:"四两"},{drug:"泽泻",dose:"三两"},{drug:"茯苓",dose:"三两"},{drug:"牡丹皮",dose:"三两"},{drug:"桂枝",dose:"一两"},{drug:"附子",dose:"一两（炮）"}], method:"上八味，末之，炼蜜和丸梧子大，酒下十五丸。", original:"崔氏八味丸：治脚气上入，少腹不仁。（中风历节病篇附方）", keyPoints:["温补肾阳、化气行水。","干地黄山茱萸薯蓣补肾填精，泽泻茯苓利水，桂枝附子温阳。","为肾阳虚衰的治法。","补阳配阴、阴中求阳。"]},
  {id:238, name:"越婢加术汤", category:"金匮要略-中风历节", composition:[{drug:"麻黄",dose:"六两"},{drug:"石膏",dose:"半斤"},{drug:"生姜",dose:"三两"},{drug:"甘草",dose:"二两"},{drug:"白术",dose:"四两"},{drug:"大枣",dose:"十五枚"}], method:"以水六升，先煮麻黄，去上沫，内诸药，煮取三升。", original:"《千金方》越婢加术汤：治肉极，热则身体津脱。（中风历节病篇附方）", keyPoints:["发汗利水、清热祛湿。","麻黄发汗利水，石膏清热，白术健脾祛湿。","为肉极津脱的治法。"]},
  {id:239, name:"黄芪桂枝五物汤", category:"金匮要略-血痹虚劳", composition:[{drug:"黄芪",dose:"三两"},{drug:"芍药",dose:"三两"},{drug:"桂枝",dose:"三两"},{drug:"生姜",dose:"六两"},{drug:"大枣",dose:"十二枚"}], method:"以水六升，煮取二升，温服七合，日三服。", original:"血痹阴阳俱微，寸口关上微，尺中小紧，外证身体不仁，如风痹状，黄芪桂枝五物汤主之。（血痹虚劳病篇）", keyPoints:["益气养血、温经通痹。","黄芪益气固表，桂枝汤调和营卫、生姜重用温经。","为血痹、身体不仁的治法。"]},
  {id:240, name:"桂枝加龙骨牡蛎汤", category:"金匮要略-血痹虚劳", composition:[{drug:"桂枝",dose:"三两"},{drug:"芍药",dose:"三两"},{drug:"生姜",dose:"三两"},{drug:"甘草",dose:"二两"},{drug:"大枣",dose:"十二枚"},{drug:"龙骨",dose:"三两"},{drug:"牡蛎",dose:"三两"}], method:"以水七升，煮取三升，分温三服。", original:"夫失精家，少腹弦急，阴头寒，目眩，发落……桂枝加龙骨牡蛎汤主之。（血痹虚劳病篇）", keyPoints:["调和阴阳、潜镇固涩。","桂枝汤调和营卫，龙骨牡蛎潜镇安神、收敛固涩。","为失精家、阴阳两虚的治法。"]},
  {id:241, name:"天雄散", category:"金匮要略-血痹虚劳", composition:[{drug:"天雄",dose:"三两（炮）"},{drug:"白术",dose:"八两"},{drug:"桂枝",dose:"六两"},{drug:"龙骨",dose:"三两"}], method:"杵为散，酒服半钱匕，日三服。", original:"天雄散方。（血痹虚劳病篇附方）", keyPoints:["温肾助阳、固涩精关。","天雄温肾助阳，白术健脾，桂枝温通，龙骨固涩。","为肾阳虚衰、遗精的治法。"]},
  {id:242, name:"小建中汤(金匮)", category:"金匮要略-血痹虚劳", composition:[{drug:"桂枝",dose:"三两（去皮）"},{drug:"甘草",dose:"二两（炙）"},{drug:"大枣",dose:"十二枚"},{drug:"芍药",dose:"六两"},{drug:"生姜",dose:"三两"},{drug:"胶饴",dose:"一升"}], method:"以水七升，煮取三升，去滓，内胶饴，更上微火消解。", original:"虚劳里急，悸，衄，腹中痛，梦失精，四肢酸疼，手足烦热，咽干口燥，小建中汤主之。（血痹虚劳病篇）", keyPoints:["温中补虚、和里缓急。","桂枝汤倍芍药加饴糖。","为虚劳里急、腹中痛的治法。","为建中法的代表方。"]},
  {id:243, name:"黄芪建中汤", category:"金匮要略-血痹虚劳", composition:[{drug:"桂枝",dose:"三两（去皮）"},{drug:"甘草",dose:"二两（炙）"},{drug:"大枣",dose:"十二枚"},{drug:"芍药",dose:"六两"},{drug:"生姜",dose:"三两"},{drug:"胶饴",dose:"一升"},{drug:"黄芪",dose:"一两半"}], method:"以水七升，煮取三升，去滓，内胶饴，更上微火消解。", original:"虚劳里急，诸不足，黄芪建中汤主之。（血痹虚劳病篇）", keyPoints:["温中补虚、益气建中。","小建中汤加黄芪，益气之力更强。","为虚劳诸不足的治法。"]},
  {id:244, name:"肾气丸", category:"金匮要略-血痹虚劳", composition:[{drug:"干地黄",dose:"八两"},{drug:"山茱萸",dose:"四两"},{drug:"薯蓣",dose:"四两"},{drug:"泽泻",dose:"三两"},{drug:"茯苓",dose:"三两"},{drug:"牡丹皮",dose:"三两"},{drug:"桂枝",dose:"一两"},{drug:"附子",dose:"一两（炮）"}], method:"上八味，末之，炼蜜和丸梧子大，酒下十五丸。", original:"虚劳腰痛，少腹拘急，小便不利者，八味肾气丸主之。（血痹虚劳病篇）", keyPoints:["温补肾阳、化气行水。","干地黄山茱萸薯蓣补肾填精，泽泻茯苓利水，桂枝附子温阳。","为肾阳虚衰、腰痛小便不利的治法。"]},
  {id:245, name:"薯蓣丸", category:"金匮要略-血痹虚劳", composition:[{drug:"薯蓣",dose:"三十分"},{drug:"当归",dose:"十分"},{drug:"桂枝",dose:"十分"},{drug:"曲",dose:"十分"},{drug:"干地黄",dose:"十分"},{drug:"豆黄卷",dose:"十分"},{drug:"甘草",dose:"二十八分"},{drug:"人参",dose:"七分"},{drug:"芎䓖",dose:"六分"},{drug:"芍药",dose:"六分"},{drug:"白术",dose:"六分"},{drug:"麦门冬",dose:"六分"},{drug:"杏仁",dose:"六分"},{drug:"柴胡",dose:"五分"},{drug:"桔梗",dose:"五分"},{drug:"茯苓",dose:"五分"},{drug:"阿胶",dose:"七分"},{drug:"干姜",dose:"三分"},{drug:"白敛",dose:"二分"},{drug:"防风",dose:"六分"},{drug:"大枣",dose:"百枚"}], method:"为末，炼蜜和丸，如弹子大，空腹酒服一丸，一百丸为剂。", original:"虚劳诸不足，风气百疾，薯蓣丸主之。（血痹虚劳病篇）", keyPoints:["补气养血、祛风散邪。","薯蓣（山药）健脾补肾为主，人参白术茯苓甘草四君补气，当归芍药芎䓖地黄麦冬阿胶养血滋阴。","为虚劳诸不足兼风气的治法。"]},
  {id:246, name:"酸枣仁汤", category:"金匮要略-血痹虚劳", composition:[{drug:"酸枣仁",dose:"二升"},{drug:"甘草",dose:"一两"},{drug:"知母",dose:"二两"},{drug:"茯苓",dose:"二两"},{drug:"芎䓖",dose:"二两"}], method:"以水八升，煮酸枣仁，得六升，内诸药，煮取三升，分温三服。", original:"虚劳虚烦不得眠，酸枣仁汤主之。（血痹虚劳病篇）", keyPoints:["养血安神、清热除烦。","酸枣仁重用养肝血、安心神，知母清热除烦，茯苓宁心安神。","为虚劳虚烦失眠的治法。"]},

  {id:296, name:"甘遂半夏汤", category:"金匮要略-痰饮咳嗽", composition:[{drug:"甘遂",dose:"大者三枚"},{drug:"半夏",dose:"十二枚"},{drug:"芍药",dose:"五枚"},{drug:"甘草",dose:"（炙）如指大一枚"}], method:"以水二升，煮取半升，去滓，以蜜半升，和药汁煎取八合，顿服之。", original:"病者脉伏，其人欲自利，利反快，虽利，心下续坚满，此为留饮欲去故也，甘遂半夏汤主之。（痰饮咳嗽病篇）", keyPoints:["攻下逐水、缓急散结。","甘遂攻下逐水，半夏散结化痰，芍药甘草酸甘缓急，蜜解甘遂之毒。","为留饮欲去、心下坚满的治法。","甘遂与甘草相反同用、激荡水饮。"]},
  {id:297, name:"十枣汤", category:"金匮要略-痰饮咳嗽", composition:[{drug:"芫花",dose:"（熬）"},{drug:"甘遂",dose:"大戟各等分"},{drug:"大枣",dose:"十枚"}], method:"上三味，捣筛，以水一升五合，先煮肥大枣十枚，取八合，去滓，内药末，强人服一钱匕，羸人服半钱匕，平旦温服之。", original:"病悬饮者，十枣汤主之。（痰饮咳嗽病篇）", keyPoints:["攻逐水饮。","芫花甘遂大戟攻逐水饮，大枣护胃。","为悬饮、悬饮内停的治法。","晨起温服、得快下利后糜粥自养。"]},
  {id:298, name:"大青龙汤(金匮)", category:"金匮要略-痰饮咳嗽", composition:[{drug:"麻黄",dose:"六两（去节）"},{drug:"桂枝",dose:"二两（去皮）"},{drug:"甘草",dose:"二两（炙）"},{drug:"杏仁",dose:"四十个（去皮尖）"},{drug:"生姜",dose:"三两（切）"},{drug:"大枣",dose:"十枚"},{drug:"石膏",dose:"如鸡子大（碎）"}], method:"以水九升，先煮麻黄，减二升，去上沫，内诸药，煮取三升。", original:"病溢饮者，当发其汗，大青龙汤主之；小青龙汤亦主之。（痰饮咳嗽病篇）", keyPoints:["发汗解表、清热除烦。","麻黄汤发汗解表加石膏清里热、姜枣和中。","为溢饮兼里热的治法。","与伤寒论大青龙汤同方。"]},
  {id:299, name:"小青龙汤(金匮)", category:"金匮要略-痰饮咳嗽", composition:[{drug:"麻黄",dose:"三两（去节）"},{drug:"芍药",dose:"三两"},{drug:"五味子",dose:"半升"},{drug:"干姜",dose:"三两"},{drug:"甘草",dose:"三两（炙）"},{drug:"细辛",dose:"三两"},{drug:"桂枝",dose:"三两（去皮）"},{drug:"半夏",dose:"半升（汤洗）"}], method:"以水一斗，先煮麻黄，减二升，去上沫，内诸药，煮取三升。", original:"病溢饮者，当发其汗……小青龙汤亦主之。（痰饮咳嗽病篇）", keyPoints:["解表散寒、温肺化饮。","麻桂解表散寒，姜辛夏温肺化饮，芍药和营，五味子敛肺。","为溢饮外寒内饮的治法。"]},
  {id:300, name:"木防己汤", category:"金匮要略-痰饮咳嗽", composition:[{drug:"木防己",dose:"三两"},{drug:"石膏",dose:"十二枚（如鸡子大）"},{drug:"桂枝",dose:"二两"},{drug:"人参",dose:"四两"}], method:"以水六升，煮取二升，分温再服。", original:"膈间支饮，其人喘满，心下痞坚，面色黧黑，其脉沉紧，得之数十日，医吐下之不愈，木防己汤主之。（痰饮咳嗽病篇）", keyPoints:["行水散结、补虚清热。","木防己利水，桂枝通阳，石膏清热，人参补虚。","为支饮、膈间痞坚的治法。","面色黧黑为饮停血瘀。"]},
  {id:301, name:"木防己加茯苓芒硝汤", category:"金匮要略-痰饮咳嗽", composition:[{drug:"木防己",dose:"三两"},{drug:"桂枝",dose:"二两"},{drug:"人参",dose:"四两"},{drug:"芒硝",dose:"三合"},{drug:"茯苓",dose:"四两"}], method:"以水六升，煮取二升，去滓，内芒硝，再微煎，分温再服，微利则愈。", original:"……虚者即愈，实者三日复发，复与不愈者，宜木防己汤去石膏加茯苓芒硝汤主之。（痰饮咳嗽病篇）", keyPoints:["行水散结、软坚泻热。","木防己汤去石膏加茯苓芒硝。","为支饮复发的治法。","实者为水饮结实。","芒硝软坚泻热。"]},
  {id:302, name:"泽泻汤", category:"金匮要略-痰饮咳嗽", composition:[{drug:"泽泻",dose:"五两"},{drug:"白术",dose:"二两"}], method:"以水二升，煮取一升，分温再服。", original:"心下有支饮，其人苦冒眩，泽泻汤主之。（痰饮咳嗽病篇）", keyPoints:["利水祛饮、健脾燥湿。","泽泻利水渗湿，白术健脾燥湿。","为支饮冒眩的治法。","苦冒眩为饮邪上泛清阳。"]},
  {id:303, name:"厚朴大黄汤", category:"金匮要略-痰饮咳嗽", composition:[{drug:"厚朴",dose:"一尺"},{drug:"大黄",dose:"六两"},{drug:"枳实",dose:"四枚"}], method:"以水五升，煮取二升，分温再服。", original:"支饮不得息，葶苈大枣泻肺汤主之。厚朴大黄汤亦主之。（痰饮咳嗽病篇）", keyPoints:["行气除满、泻下导滞。","厚朴行气，大黄枳实泻下。","为支饮腹满便秘的治法。"]},
  {id:304, name:"葶苈大枣泻肺汤(金匮)", category:"金匮要略-痰饮咳嗽", composition:[{drug:"葶苈",dose:"（熬令黄色，捣丸如弹子大）"},{drug:"大枣",dose:"十二枚"}], method:"先以水三升，煮枣取二升，去枣，内葶苈，煮取一升，顿服。", original:"支饮不得息，葶苈大枣泻肺汤主之。（痰饮咳嗽病篇）", keyPoints:["泻肺逐水、护中扶正。","葶苈子泻肺逐水，大枣护中。","为支饮痰壅、不得息的治法。"]},
  {id:305, name:"小半夏汤", category:"金匮要略-痰饮咳嗽", composition:[{drug:"半夏",dose:"一升"},{drug:"生姜",dose:"半斤"}], method:"以水七升，煮取一升半，分温再服。", original:"呕家本渴，渴者为欲解，今反不渴，心下有支饮故也，小半夏汤主之。（痰饮咳嗽病篇）", keyPoints:["和胃止呕、散饮降逆。","半夏和胃降逆、化饮止呕，生姜温胃散水。","为支饮呕吐的治法。"]},
  {id:306, name:"己椒苈黄丸", category:"金匮要略-痰饮咳嗽", composition:[{drug:"防己",dose:""},{drug:"椒目",dose:""},{drug:"葶苈",dose:"（熬）"},{drug:"大黄",dose:"各一两"}], method:"为末，蜜丸如梧子大，先食饮服一丸，日三服，稍增，口中有津液。渴者加芒硝半两。", original:"腹满，口舌干燥，此肠间有水气，己椒苈黄丸主之。（痰饮咳嗽病篇）", keyPoints:["攻逐水饮、行气消满。","防己椒目葶苈利水，大黄泻下。","为肠间水气、腹满的治法。"]},
  {id:307, name:"茯苓饮", category:"金匮要略-痰饮咳嗽", composition:[{drug:"茯苓",dose:"三两"},{drug:"人参",dose:"三两"},{drug:"白术",dose:"三两"},{drug:"枳实",dose:"二两"},{drug:"橘皮",dose:"二两半"},{drug:"生姜",dose:"四两"}], method:"以水六升，煮取一升八合，分温三服，如人行八九里进之。", original:"《外台》茯苓饮：治心胸中有停痰宿水，自吐出水后，心胸间虚，气满，不能食，消痰气，令能食。（痰饮咳嗽病篇附方）", keyPoints:["健脾祛湿、行气消痰。","茯苓白术健脾祛湿，人参益气，枳实橘皮行气，生姜和胃。","为脾胃虚弱、停痰宿水的治法。"]},
  {id:308, name:"五苓散(金匮)", category:"金匮要略-痰饮咳嗽", composition:[{drug:"泽泻",dose:"一两六铢"},{drug:"猪苓",dose:"十八铢（去皮）"},{drug:"茯苓",dose:"十八铢"},{drug:"白术",dose:"十八铢"},{drug:"桂枝",dose:"半两"}], method:"为末，白饮服方寸匕，日三服，多饮暖水，汗出愈。", original:"假令瘦人脐下有悸，吐涎沫而癫眩，此水也，五苓散主之。（痰饮咳嗽病篇）", keyPoints:["化气利水、解表散邪。","二苓泽泻利水，白术健脾，桂枝化气解表。","为下焦水逆、脐下悸的治法。"]},
  {id:309, name:"附方：茯苓丸", category:"金匮要略-痰饮咳嗽", composition:[{drug:"茯苓",dose:"二两"},{drug:"枳壳",dose:"半两"},{drug:"半夏",dose:"二两"},{drug:"风化朴硝",dose:"一分"}], method:"为细末，生姜汁煮面糊为丸如梧子大，每服三十丸，生姜汤下。", original:"《外台》茯苓丸。（痰饮咳嗽病篇附方）", keyPoints:["化痰软坚、健脾祛湿。","茯苓健脾渗湿，半夏化痰，枳壳行气，朴硝软坚。","为痰浊凝结、臂痛难举的治法。"]},
  {id:310, name:"附方：十枣汤(金匮)", category:"金匮要略-痰饮咳嗽", composition:[{drug:"芫花",dose:"（熬）"},{drug:"甘遂",dose:""},{drug:"大戟",dose:"等分"},{drug:"大枣",dose:"十枚"}], method:"三味等分，捣筛，以水一升五合，先煮肥大枣十枚，取八合，去滓，纳药末。", original:"……病悬饮者，十枣汤主之。（痰饮咳嗽病篇）", keyPoints:["攻逐水饮。","芫花甘遂大戟攻逐水饮，大枣护胃。","为悬饮的治法。"]},
  {id:311, name:"附方：小青龙汤(金匮附)", category:"金匮要略-痰饮咳嗽", composition:[{drug:"麻黄",dose:"三两"},{drug:"甘草",dose:"三两"},{drug:"桂枝",dose:"三两"},{drug:"芍药",dose:"三两"},{drug:"五味子",dose:"半升"},{drug:"干姜",dose:"三两"},{drug:"细辛",dose:"三两"},{drug:"半夏",dose:"半升"}], method:"以水一斗，先煮麻黄，减二升，去上沫，内诸药，煮取三升。", original:"《外台》小青龙汤。（痰饮咳嗽病篇附方）", keyPoints:["解表散寒、温肺化饮。","为支饮咳逆倚息、不得卧的治法。"]},
  {id:312, name:"附方：木防己汤(金匮附)", category:"金匮要略-痰饮咳嗽", composition:[{drug:"木防己",dose:"三两"},{drug:"石膏",dose:"三两"},{drug:"桂枝",dose:"二两"},{drug:"人参",dose:"四两"}], method:"以水六升，煮取二升，分温再服。", original:"《外台》木防己汤。（痰饮咳嗽病篇附方）", keyPoints:["行水散结、补虚清热。","为支饮、膈间痞坚的治法。"]},
  {id:313, name:"肾气丸(金匮消渴)", category:"金匮要略-消渴小便不利淋病", composition:[{drug:"干地黄",dose:"八两"},{drug:"山茱萸",dose:"四两"},{drug:"薯蓣",dose:"四两"},{drug:"泽泻",dose:"三两"},{drug:"茯苓",dose:"三两"},{drug:"牡丹皮",dose:"三两"},{drug:"桂枝",dose:"一两"},{drug:"附子",dose:"一两"}], method:"末之，炼蜜和丸梧子大，酒下十五丸。", original:"男子消渴，小便反多，以饮一斗，小便一斗，肾气丸主之。（消渴小便不利淋病篇）", keyPoints:["温补肾阳、化气行水。","为肾阳虚消渴的治法。","男子消渴多肾阳虚。"]},
  {id:314, name:"五苓散(金匮消渴)", category:"金匮要略-消渴小便不利淋病", composition:[{drug:"泽泻",dose:"一两六铢"},{drug:"猪苓",dose:"十八铢"},{drug:"茯苓",dose:"十八铢"},{drug:"白术",dose:"十八铢"},{drug:"桂枝",dose:"半两"}], method:"为末，白饮服方寸匕，日三服。", original:"脉浮，小便不利，微热消渴者，宜利小便、发汗，五苓散主之。（消渴小便不利淋病篇）", keyPoints:["化气利水。","为蓄水消渴的治法。"]},
  {id:315, name:"文蛤散", category:"金匮要略-消渴小便不利淋病", composition:[{drug:"文蛤",dose:"五两"}], method:"为散，以沸汤五合，和服方寸匕。", original:"渴欲饮水不止者，文蛤散主之。（消渴小便不利淋病篇）", keyPoints:["清热润燥、生津止渴。","文蛤咸寒、清热生津止渴。","为渴欲饮水不止的治法。"]},
  {id:316, name:"瓜蒌瞿麦丸", category:"金匮要略-消渴小便不利淋病", composition:[{drug:"瓜蒌根",dose:"二两"},{drug:"茯苓",dose:"三两"},{drug:"薯蓣",dose:"三两"},{drug:"附子",dose:"一枚（炮）"},{drug:"瞿麦",dose:"一两"}], method:"为末，炼蜜丸梧子大，饮服三丸，日三服。不知，增至七八丸，以小便利、腹中温为知。", original:"小便不利者，有水气，其人苦渴，瓜蒌瞿麦丸主之。（消渴小便不利淋病篇）", keyPoints:["润燥生津、温阳利水。","瓜蒌根薯蓣生津润燥，瞿麦茯苓利水，附子温阳。","为上燥下寒、小便不利的治法。"]},
  {id:317, name:"蒲灰散", category:"金匮要略-消渴小便不利淋病", composition:[{drug:"蒲灰",dose:"七分"},{drug:"滑石",dose:"三分"}], method:"为散，饮服方寸匕，日三服。", original:"小便不利，蒲灰散主之；滑石白鱼散、茯苓戎盐汤并主之。（消渴小便不利淋病篇）", keyPoints:["清热利湿、凉血消瘀。","蒲灰（蒲黄粉）凉血消瘀，滑石清热利湿。","为湿热小便不利的治法。","临床用于淋证。"]},
  {id:318, name:"滑石白鱼散", category:"金匮要略-消渴小便不利淋病", composition:[{drug:"滑石",dose:"二分"},{drug:"乱发",dose:"二分（烧）"},{drug:"白鱼",dose:"二分"}], method:"为散，饮服方寸匕，日三服。", original:"……滑石白鱼散……并主之。（消渴小便不利淋病篇）", keyPoints:["清热利湿、化瘀通淋。","滑石清热利湿，乱发（血余）化瘀，白鱼通淋。","为湿热瘀血小便不利的治法。"]},
  {id:319, name:"茯苓戎盐汤", category:"金匮要略-消渴小便不利淋病", composition:[{drug:"茯苓",dose:"半斤"},{drug:"白术",dose:"二两"},{drug:"戎盐",dose:"（弹丸大一枚）"}], method:"先将茯苓、白术煎成，入戎盐再煎，分温三服。", original:"……茯苓戎盐汤并主之。（消渴小便不利淋病篇）", keyPoints:["健脾利湿、软坚通淋。","茯苓白术健脾利湿，戎盐（青盐）软坚通淋。","为脾虚湿盛、小便不利的治法。"]},
  {id:320, name:"猪苓汤(金匮)", category:"金匮要略-消渴小便不利淋病", composition:[{drug:"猪苓",dose:"（去皮）"},{drug:"茯苓",dose:""},{drug:"泽泻",dose:""},{drug:"滑石",dose:""},{drug:"阿胶",dose:"各一两"}], method:"以水四升，先煮四味，取二升，去滓，内阿胶烊消，温服七合。", original:"脉浮发热，渴欲饮水，小便不利者，猪苓汤主之。（消渴小便不利淋病篇）", keyPoints:["利水清热养阴。","二苓泽泻利水，滑石清热，阿胶养阴。","为水热互结伤阴的治法。"]},
  {id:321, name:"越婢汤", category:"金匮要略-水气病", composition:[{drug:"麻黄",dose:"六两"},{drug:"石膏",dose:"半斤"},{drug:"生姜",dose:"三两"},{drug:"甘草",dose:"二两"},{drug:"大枣",dose:"十五枚"}], method:"以水六升，先煮麻黄，去上沫，内诸药，煮取三升，分温三服。恶风者加附子一枚，炮。", original:"风水，一身悉肿，脉浮不渴，无大热者，越婢汤主之。（水气病篇）", keyPoints:["发汗利水、清泄郁热。","麻黄发汗利水，石膏清郁热，姜枣草和中。","为风水一身悉肿的治法。"]},
  {id:322, name:"防己茯苓汤", category:"金匮要略-水气病", composition:[{drug:"防己",dose:"三两"},{drug:"黄芪",dose:"三两"},{drug:"桂枝",dose:"三两"},{drug:"茯苓",dose:"六两"},{drug:"甘草",dose:"二两"}], method:"以水六升，煮取二升，分温三服。", original:"皮水为病，四肢肿，水气在皮肤中，四肢聂聂动者，防己茯苓汤主之。（水气病篇）", keyPoints:["益气通阳、利水消肿。","防己茯苓利水，桂枝通阳，黄芪益气，甘草调和。","为皮水四肢肿的治法。"]},
  {id:323, name:"甘草麻黄汤", category:"金匮要略-水气病", composition:[{drug:"甘草",dose:"二两"},{drug:"麻黄",dose:"四两"}], method:"以水五升，先煮麻黄，去上沫，内甘草，煮取三升，温服一升，重覆汗出，不汗，再服。慎风寒。", original:"里水，越婢加术汤主之；甘草麻黄汤亦主之。（水气病篇）", keyPoints:["发汗解表、利水消肿。","麻黄发汗利水，甘草调和。","为皮水里水的治法。","重覆汗出、不汗再服。"]},
  {id:324, name:"杏子汤", category:"金匮要略-水气病", composition:[{drug:"杏仁",dose:""},{drug:"麻黄",dose:""},{drug:"石膏",dose:""},{drug:"甘草",dose:""}], method:"（方未见）", original:"……浮者宜杏子汤。（水气病篇）", keyPoints:["宣肺发汗、利水消肿。","为风水浮脉的治法。","方未见、或为麻杏石甘汤。"]},
  {id:325, name:"黄芪芍桂苦酒汤", category:"金匮要略-水气病", composition:[{drug:"黄芪",dose:"五两"},{drug:"芍药",dose:"三两"},{drug:"桂枝",dose:"三两"}], method:"以苦酒一升，水七升，相和，煮取三升，温服一升，当心烦，服至六七日乃解。若心烦不止者，以苦酒阻故也。", original:"黄汗之病，两胫自冷，假令发热，此属历节。食已汗出，又身常暮卧盗汗出者，此劳气也。若汗出已反发热者，久久其身必甲错；发热不止者，必生恶疮。若身重，汗出已辄轻者，久久必身目闰，闰即胸中痛，又从腰以上必汗出，下无汗，腰髋弛痛，如有物在皮中状，剧者不能食，身疼重，烦躁，小便不利，此为黄汗，桂枝加黄芪汤主之。（水气病篇）", keyPoints:["益气固表、调和营卫。","黄芪益气固表，桂枝芍药调和营卫，苦酒（醋）引药入经。","为黄汗的治法。"]},
  {id:326, name:"桂枝加黄芪汤", category:"金匮要略-水气病", composition:[{drug:"桂枝",dose:"三两"},{drug:"芍药",dose:"三两"},{drug:"甘草",dose:"二两"},{drug:"生姜",dose:"三两"},{drug:"大枣",dose:"十二枚"},{drug:"黄芪",dose:"二两"}], method:"以水八升，煮取三升，温服一升，须臾饮热稀粥一升余，以助药力，温覆取微汗；若不汗，更服。", original:"……黄汗，桂枝加黄芪汤主之。（水气病篇）", keyPoints:["调和营卫、益气固表。","桂枝汤调和营卫，加黄芪益气固表。","为黄汗、营卫不和的治法。"]},
  {id:327, name:"桂枝去芍药加麻黄细辛附子汤", category:"金匮要略-水气病", composition:[{drug:"桂枝",dose:"三两"},{drug:"生姜",dose:"三两"},{drug:"甘草",dose:"二两"},{drug:"大枣",dose:"十二枚"},{drug:"麻黄",dose:"二两"},{drug:"细辛",dose:"二两"},{drug:"附子",dose:"一枚（炮）"}], method:"以水七升，煮麻黄，去上沫，内诸药，煮取二升，分温三服。当汗出，如虫行皮中，即愈。", original:"气分，心下坚，大如盘，边如旋杯，水饮所作，桂枝去芍药加麻黄细辛附子汤主之。（水气病篇）", keyPoints:["温阳散寒、通阳化气。","桂枝去芍药加麻黄细辛附子，温阳散寒、通阳。","为气分病、心下坚满的治法。"]},
  {id:328, name:"枳术汤", category:"金匮要略-水气病", composition:[{drug:"枳实",dose:"七枚"},{drug:"白术",dose:"二两"}], method:"以水五升，煮取三升，分温三服，腹中软即当散也。", original:"心下坚，大如盘，边如旋盘，水饮所作，枳术汤主之。（水气病篇）", keyPoints:["行气消痞、健脾利水。","枳实行气消痞，白术健脾利水。","为气分病、心下坚满轻证的治法。","与上方区别：此偏气滞、方偏阳虚。"]},
  {id:329, name:"蒲灰散(水气)", category:"金匮要略-水气病", composition:[{drug:"蒲灰",dose:"七分"},{drug:"滑石",dose:"三分"}], method:"为散，饮服方寸匕，日三服。", original:"厥而皮水者，蒲灰散主之。（水气病篇）", keyPoints:["清热利湿、凉血消肿。","为皮水厥冷的治法。"]},
  {id:330, name:"附方：海藻丸", category:"金匮要略-水气病", composition:[{drug:"（不详）"}], method:"（方未见）", original:"《外台》海藻丸：治妇人。（水气病篇附方）", keyPoints:["软坚散结、利水消肿。","为水气病的辅佐方。"]}
,
  {id:331, name:"茵陈蒿汤", category:"金匮要略-黄疸病", composition:[{drug:"茵陈蒿",dose:"六两"},{drug:"栀子",dose:"十四枚"},{drug:"大黄",dose:"二两"}], method:"以水一斗，先煮茵陈，减六升，内二味，煮取三升，去滓，分温三服。", original:"谷疸之为病，寒热不食，食即头眩，心胸不安，久久发黄为谷疸，茵陈蒿汤主之。（黄疸病篇）", keyPoints:["清热利湿、退黄消疸。","茵陈清热利湿退黄，栀子清热利三焦，大黄泻热退黄。","为湿热黄疸的主方，尤适用于谷疸。","尿黄、腹微满为湿热蕴结之征。"]},
  {id:332, name:"硝石矾石散", category:"金匮要略-黄疸病", composition:[{drug:"硝石",dose:"等分"},{drug:"矾石",dose:"等分"}], method:"为散，大麦粥汁和服方寸匕，日三服。", original:"黄家日晡所发热，而反恶寒，此为女劳得之；膀胱急，少腹满，身尽黄，额上黑，足下热，因作黑疸，硝石矾石散主之。（黄疸病篇）", keyPoints:["消瘀化湿、通利二便。","硝石消瘀散结，矾石燥湿退黄。","为女劳疸（黑疸）的治法。","大便必黑为瘀血内结之征。"]},
  {id:333, name:"栀子大黄汤", category:"金匮要略-黄疸病", composition:[{drug:"栀子",dose:"十四枚"},{drug:"大黄",dose:"一两"},{drug:"枳实",dose:"五枚"},{drug:"香豉",dose:"一升"}], method:"以水六升，煮取二升，分温三服。", original:"酒疸下之，久久为黑疸，目青面黑，心中如啖蒜齑状，大便正黑，皮肤爪之不仁，其脉浮弱，虽黑微黄，故知之。（黄疸病篇附方）", keyPoints:["清热利湿、泻下退黄。","栀子清热利三焦，大黄泻热，枳实破滞，香豉和中。","为酒疸误下转为黑疸的治法。","心中啖蒜状为热毒上扰。"]},
  {id:334, name:"猪膏发煎", category:"金匮要略-黄疸病", composition:[{drug:"猪膏",dose:"半斤"},{drug:"乱发",dose:"如鸡子大三枚"}], method:"上二味，和膏中煎之，发消药成，分再服。", original:"诸黄，猪膏发煎主之。（黄疸病篇）", keyPoints:["润燥消瘀、养血退黄。","猪膏润燥养血，乱发消瘀通便。","为燥结血瘀黄疸的治法。","尤适用于大便干结者。"]},
  {id:335, name:"茵陈五苓散", category:"金匮要略-黄疸病", composition:[{drug:"茵陈蒿末",dose:"十分"},{drug:"五苓散末",dose:"五分"}], method:"上二味和，先食饮服方寸匕，日三服。", original:"黄疸病，茵陈五苓散主之。（黄疸病篇）", keyPoints:["清热利湿、分消黄疸。","茵陈清热利湿退黄，五苓散化气利水。","为湿重热轻黄疸的治法。","小便不利、腹胀为适用指征。"]},
  {id:336, name:"大黄硝石汤", category:"金匮要略-黄疸病", composition:[{drug:"大黄",dose:"四两"},{drug:"黄柏",dose:"四两"},{drug:"硝石",dose:"四两"},{drug:"栀子",dose:"十五枚"}], method:"以水六升，煮取二升，去滓，内硝石，更煮取一升，顿服。", original:"黄疸腹满，小便不利而赤，自汗出，此为表和里实，当下之，宜大黄硝石汤。（黄疸病篇）", keyPoints:["泻热通腑、清热退黄。","大黄泻热通腑，硝石软坚散结，黄柏栀子清热燥湿。","为里热壅盛黄疸的治法，症见腹满、便秘、尿赤、自汗。","脉象沉实为当下之征。"]},
  {id:337, name:"小半夏汤", category:"金匮要略-黄疸病", composition:[{drug:"半夏",dose:"一升"},{drug:"生姜",dose:"半斤"}], method:"以水七升，煮取一升半，分温再服。", original:"黄疸病，小便色不变，欲自利，腹满而喘，不可除热，热除必哕。哕者，小半夏汤主之。（黄疸病篇）", keyPoints:["和胃降逆、温化寒饮。","半夏降逆和胃，生姜温中止呕。","为黄疸误下伤胃、寒饮内停而哕的治法。","此证为寒哕，非热哕。"]},
  {id:338, name:"柴胡汤", category:"金匮要略-黄疸病", composition:[{drug:"柴胡",dose:"半斤"},{drug:"黄芩",dose:"三两"},{drug:"人参",dose:"三两"},{drug:"甘草",dose:"三两"},{drug:"半夏",dose:"半升"},{drug:"生姜",dose:"三两"},{drug:"大枣",dose:"十二枚"}], method:"以水一斗二升，煮取六升，去滓，再煎取三升，温服一升，日三服。", original:"诸病黄家，但利其小便。假令脉浮，当以汗解之，宜桂枝加黄芪汤主之。又：诸黄，腹痛而呕者，宜柴胡汤。（黄疸病篇）", keyPoints:["和解少阳、扶正祛邪。","小柴胡汤疏解少阳，和胃止呕。","为黄疸兼少阳腹痛、呕吐的治法。","病在少阳，寒热往来，腹痛而呕。"]},
  {id:339, name:"小建中汤", category:"金匮要略-黄疸病", composition:[{drug:"桂枝",dose:"三两"},{drug:"甘草",dose:"二两"},{drug:"芍药",dose:"六两"},{drug:"生姜",dose:"三两"},{drug:"胶饴",dose:"一升"},{drug:"大枣",dose:"十二枚"}], method:"以水七升，煮取三升，去滓，内胶饴，更上微火消解，温服一升，日三服。", original:"男子黄，小便自利，当与虚劳小建中汤。（黄疸病篇）", keyPoints:["建中补虚、调养气血。","小建中汤甘温建中、缓急止痛。","为虚劳萎黄、小便自利的治法。","此为虚证黄疸，非湿热黄疸。"]},
  {id:340, name:"桂枝加黄芪汤", category:"金匮要略-黄疸病", composition:[{drug:"桂枝",dose:"三两"},{drug:"芍药",dose:"三两"},{drug:"甘草",dose:"二两"},{drug:"生姜",dose:"三两"},{drug:"大枣",dose:"十二枚"},{drug:"黄芪",dose:"二两"}], method:"以水八升，煮取三升，温服一升，须臾饮热稀粥一升余，以助药力，温覆取微汗。", original:"诸病黄家，但利其小便。假令脉浮，当以汗解之，宜桂枝加黄芪汤主之。（黄疸病篇）", keyPoints:["调和营卫、益气固表。","桂枝汤调和营卫，加黄芪益气固表。","为黄疸表虚、脉浮、宜汗的治法。","此为黄疸兼表虚之证。"]},
  {id:341, name:"桂枝救逆汤", category:"金匮要略-惊悸吐衄下血", composition:[{drug:"桂枝",dose:"三两"},{drug:"甘草",dose:"二两"},{drug:"生姜",dose:"三两"},{drug:"牡蛎",dose:"五两"},{drug:"龙骨",dose:"四两"},{drug:"蜀漆",dose:"三两"},{drug:"大枣",dose:"十二枚"}], method:"以水一斗二升，先煮蜀漆，减二升，内诸药，煮取三升，去滓，温服一升。", original:"火邪者，桂枝去芍药加蜀漆牡蛎龙骨救逆汤主之。（惊悸吐衄下血篇）", keyPoints:["温阳复脉、镇惊安神。","桂枝去芍药加蜀漆牡蛎龙骨，温阳镇惊。","为火邪劫阴、惊狂不安的治法。","惊狂、卧起不安为主症。"]},
  {id:342, name:"半夏麻黄丸", category:"金匮要略-惊悸吐衄下血", composition:[{drug:"半夏",dose:"等分"},{drug:"麻黄",dose:"等分"}], method:"上二味，末之，炼蜜和丸如小豆大，饮服三丸，日三服。", original:"心下悸者，半夏麻黄丸主之。（惊悸吐衄下血篇）", keyPoints:["化饮降逆、通阳定悸。","半夏化痰饮，麻黄通阳散结。","为水饮内停、心下悸的治法。","心下悸而非心悸，病因水饮。"]},
  {id:343, name:"柏叶汤", category:"金匮要略-惊悸吐衄下血", composition:[{drug:"柏叶",dose:"三两"},{drug:"干姜",dose:"三两"},{drug:"艾叶",dose:"三把"}], method:"以水五升，取马通汁一升，合煮取一升，分温再服。", original:"吐血不止者，柏叶汤主之。（惊悸吐衄下血篇）", keyPoints:["温经止血、引血归经。","柏叶止血，干姜温经，艾叶温经止血。","为中气虚寒、血不归经之吐血的治法。","血色暗淡、面色萎黄为虚寒吐血特征。"]},
  {id:344, name:"黄土汤", category:"金匮要略-惊悸吐衄下血", composition:[{drug:"甘草",dose:"三两"},{drug:"干地黄",dose:"三两"},{drug:"白术",dose:"三两"},{drug:"附子",dose:"三两（炮）"},{drug:"阿胶",dose:"三两"},{drug:"黄芩",dose:"三两"},{drug:"灶心黄土",dose:"半斤"}], method:"以水八升，煮取二升，分温二服。", original:"下血，先便后血，此远血也，黄土汤主之。（惊悸吐衄下血篇）", keyPoints:["温阳健脾、养血止血。","灶心黄土温中止血，附子白术温阳健脾，阿胶地黄养血。","为脾阳虚寒、统摄无权之下血的治法。","血色紫暗、腹痛喜温为特征。"]},
  {id:345, name:"泻心汤", category:"金匮要略-惊悸吐衄下血", composition:[{drug:"大黄",dose:"二两"},{drug:"黄连",dose:"一两"},{drug:"黄芩",dose:"一两"}], method:"以水三升，煮取一升，顿服之。", original:"心气不足，吐血、衄血，泻心汤主之。（惊悸吐衄下血篇）", keyPoints:["清热泻火、凉血止血。","大黄泻热降逆，黄连黄芩清热泻火。","为心火亢盛、迫血妄行之吐衄的治法。","血色鲜红、面红目赤、烦躁为实热特征。"]},
  {id:346, name:"赤小豆当归散", category:"金匮要略-惊悸吐衄下血", composition:[{drug:"赤小豆",dose:"三升（浸，令芽出）"},{drug:"当归",dose:"三两"}], method:"杵为散，浆水服方寸匕，日三服。", original:"下血，先血后便，此近血也，赤小豆当归散主之。（惊悸吐衄下血篇）", keyPoints:["清热利湿、活血止血。","赤小豆利湿清热排脓，当归活血祛瘀。","为湿热下注、大肠出血（近血）的治法。","先血后便，血色鲜红。"]},
  {id:347, name:"酸枣仁汤", category:"金匮要略-惊悸吐衄下血", composition:[{drug:"酸枣仁",dose:"二升"},{drug:"知母",dose:"二两"},{drug:"茯苓",dose:"二两"},{drug:"川芎",dose:"一两"},{drug:"甘草",dose:"一两"}], method:"以水八升，煮酸枣仁得六升，内诸药，煮取三升，分温三服。", original:"虚劳虚烦不得眠，酸枣仁汤主之。（惊悸吐衄下血篇附方）", keyPoints:["养血安神、清热除烦。","酸枣仁养血安神，川芎知母调肝清热。","为肝血不足、虚烦不眠的治法。","虚烦失眠、心悸盗汗为特征。"]},
  {id:348, name:"甘草干姜汤", category:"金匮要略-惊悸吐衄下血", composition:[{drug:"甘草",dose:"四两（炙）"},{drug:"干姜",dose:"二两"}], method:"以水三升，煮取一升半，去滓，分温再服。", original:"肺痿吐涎沫而不咳者，其人不渴，必遗尿，小便数。所以然者，以上虚不能制下故也。此为肺中冷，必眩，多涎唾，甘草干姜汤以温之。（惊悸吐衄下血篇）", keyPoints:["温肺散寒、复阳摄津。","甘草干姜汤温肺散寒，复阳气。","为肺中虚冷、涎沫多的治法。","遗尿、小便数、头眩为肺冷不能制下。"]},
  {id:349, name:"小建中汤", category:"金匮要略-惊悸吐衄下血", composition:[{drug:"桂枝",dose:"三两"},{drug:"甘草",dose:"二两"},{drug:"芍药",dose:"六两"},{drug:"生姜",dose:"三两"},{drug:"胶饴",dose:"一升"},{drug:"大枣",dose:"十二枚"}], method:"以水七升，煮取三升，去滓，内胶饴，更上微火消解，温服一升，日三服。", original:"虚劳里急、悸、衄、腹中痛，梦失精，四肢酸疼，手足烦热，咽干口燥，小建中汤主之。（惊悸吐衄下血篇附方）", keyPoints:["建中补虚、调养气血。","小建中汤甘温建中、缓急止痛。","为虚劳阴阳两虚的治法。","悸、衄、腹中痛、虚烦为阴阳两虚特征。"]},
  {id:350, name:"吴茱萸汤", category:"金匮要略-呕吐哕下利", composition:[{drug:"吴茱萸",dose:"一升"},{drug:"人参",dose:"三两"},{drug:"生姜",dose:"六两"},{drug:"大枣",dose:"十二枚"}], method:"以水五升，煮取二升，温服七合，日三服。", original:"呕而胸满者，吴茱萸汤主之。（呕吐哕下利病篇）", keyPoints:["温中散寒、降逆止呕。","吴茱萸温中散寒、降逆止呕，人参大枣补虚，生姜和胃。","为肝胃虚寒、浊阴上逆之呕吐的治法。","干呕吐涎沫、头痛为肝寒上逆特征。"]},
  {id:351, name:"四逆汤", category:"金匮要略-呕吐哕下利", composition:[{drug:"附子",dose:"一枚（生用）"},{drug:"干姜",dose:"一两半"},{drug:"甘草",dose:"二两（炙）"}], method:"以水三升，煮取一升二合，去滓，分温再服。", original:"呕而脉弱，小便复利，身有微热，见厥者，难治，四逆汤主之。（呕吐哕下利病篇）", keyPoints:["回阳救逆、温中散寒。","附子温肾回阳，干姜温中散寒，甘草缓急调和。","为阳衰阴盛、呕吐肢厥的治法。","脉弱、厥冷为阳气衰微之征。"]},
  {id:352, name:"小柴胡汤", category:"金匮要略-呕吐哕下利", composition:[{drug:"柴胡",dose:"半斤"},{drug:"黄芩",dose:"三两"},{drug:"人参",dose:"三两"},{drug:"甘草",dose:"三两"},{drug:"半夏",dose:"半升"},{drug:"生姜",dose:"三两"},{drug:"大枣",dose:"十二枚"}], method:"以水一斗二升，煮取六升，去滓，再煎取三升，温服一升，日三服。", original:"呕而发热者，小柴胡汤主之。（呕吐哕下利病篇）", keyPoints:["和解少阳、调达枢机。","小柴胡汤疏解少阳，和胃止呕。","为少阳邪热迫胃之呕吐的治法。","呕而发热、口苦咽干为少阳证。"]},
  {id:353, name:"大半夏汤", category:"金匮要略-呕吐哕下利", composition:[{drug:"半夏",dose:"二升"},{drug:"人参",dose:"三两"},{drug:"白蜜",dose:"一升"}], method:"以水一斗二升，和蜜扬之二百四十遍，煮药取二升半，温服一升，余分再服。", original:"胃反呕吐者，大半夏汤主之。（呕吐哕下利病篇）", keyPoints:["和胃降逆、补虚润燥。","半夏降逆止呕，人参白蜜补虚润燥。","为脾胃虚寒、胃反呕吐的治法。","朝食暮吐、暮食朝吐为胃反特征。"]},
  {id:354, name:"茯苓泽泻汤", category:"金匮要略-呕吐哕下利", composition:[{drug:"茯苓",dose:"半斤"},{drug:"泽泻",dose:"四两"},{drug:"甘草",dose:"二两"},{drug:"桂枝",dose:"二两"},{drug:"白术",dose:"三两"},{drug:"生姜",dose:"四两"}], method:"以水一斗，煮取二升，内泽泻，再煮取二升半，温服八合，日三服。", original:"胃反，吐而渴欲饮水者，茯苓泽泻汤主之。（呕吐哕下利病篇）", keyPoints:["化气利水、和胃止渴。","茯苓泽泻利水渗湿，桂枝化气，生姜和胃。","为水饮内停、胃反口渴的治法。","吐而渴欲饮水为饮停下焦、气化不利。"]},
  {id:355, name:"半夏泻心汤", category:"金匮要略-呕吐哕下利", composition:[{drug:"半夏",dose:"半升"},{drug:"黄芩",dose:"三两"},{drug:"干姜",dose:"三两"},{drug:"人参",dose:"三两"},{drug:"黄连",dose:"一两"},{drug:"大枣",dose:"十二枚"},{drug:"甘草",dose:"三两（炙）"}], method:"以水一斗，煮取六升，去滓，再煮取三升，温服一升，日三服。", original:"呕而肠鸣，心下痞者，半夏泻心汤主之。（呕吐哕下利病篇）", keyPoints:["和中降逆、开结消痞。","半夏降逆和胃，芩连清热，干姜人参枣草调中。","为寒热错杂、呕而肠鸣心下痞的治法。","心下痞满、呕逆肠鸣为特征。"]},
  {id:356, name:"黄芩加半夏生姜汤", category:"金匮要略-呕吐哕下利", composition:[{drug:"黄芩",dose:"三两"},{drug:"甘草",dose:"二两（炙）"},{drug:"芍药",dose:"二两"},{drug:"半夏",dose:"半升"},{drug:"生姜",dose:"三两"},{drug:"大枣",dose:"十二枚"}], method:"以水一斗，煮取三升，去滓，温服一升，日再夜一服。", original:"干呕而利者，黄芩加半夏生姜汤主之。（呕吐哕下利病篇）", keyPoints:["清热止利、和胃降逆。","黄芩汤清热止利，半夏生姜和胃降逆。","为热利兼干呕的治法。","干呕与下利并见，热在胃肠。"]},
  {id:357, name:"小半夏汤", category:"金匮要略-呕吐哕下利", composition:[{drug:"半夏",dose:"一升"},{drug:"生姜",dose:"半斤"}], method:"以水七升，煮取一升半，分温再服。", original:"诸呕吐，谷不得下者，小半夏汤主之。（呕吐哕下利病篇）", keyPoints:["和胃降逆、化痰止呕。","半夏降逆止呕，生姜温胃散寒。","为痰饮呕吐、谷不得下的治法。","呕吐痰涎、苔白腻为痰饮特征。"]},
  {id:358, name:"猪苓散", category:"金匮要略-呕吐哕下利", composition:[{drug:"猪苓",dose:"等分"},{drug:"茯苓",dose:"等分"},{drug:"白术",dose:"等分"}], method:"杵为散，饮服方寸匕，日三服。", original:"呕吐而病在膈上，后思水者，解，急与之。思水者，猪苓散主之。（呕吐哕下利病篇）", keyPoints:["健脾利水、清热生津。","猪苓茯苓利水，白术健脾。","为吐后思水、胃热未清的治法。","呕吐后思水，胃中余热未清。"]},
  {id:359, name:"通脉四逆汤", category:"金匮要略-呕吐哕下利", composition:[{drug:"附子",dose:"大者一枚（生用）"},{drug:"干姜",dose:"三两"},{drug:"甘草",dose:"二两（炙）"}], method:"以水三升，煮取一升二合，去滓，分温再服。", original:"下利清谷，里寒外热，汗出而厥者，通脉四逆汤主之。（呕吐哕下利病篇）", keyPoints:["回阳通脉、散寒救逆。","附子干姜温肾回阳，甘草缓急。","为阴盛格阳、下利清谷的治法。","里寒外热、汗出肢厥为格阳证。"]},
  {id:360, name:"诃黎勒散", category:"金匮要略-呕吐哕下利", composition:[{drug:"诃黎勒",dose:"十枚（煨）"}], method:"为散，粥饮和，顿服。", original:"气利，诃黎勒散主之。（呕吐哕下利病篇）", keyPoints:["涩肠固脱、下气消胀。","诃黎勒涩肠固脱、下气消胀。","为气利（下利滑脱，气滞腹胀）的治法。","下利不止、矢气频作为气利特征。"]},
  {id:361, name:"白头翁汤", category:"金匮要略-呕吐哕下利", composition:[{drug:"白头翁",dose:"二两"},{drug:"黄连",dose:"三两"},{drug:"黄柏",dose:"三两"},{drug:"秦皮",dose:"三两"}], method:"以水七升，煮取二升，去滓，温服一升。不愈，更服。", original:"热利下重者，白头翁汤主之。（呕吐哕下利病篇）", keyPoints:["清热燥湿、凉血止痢。","白头翁清热凉血止痢，黄连黄柏秦皮清热燥湿。","为湿热下利、里急后重的治法。","下利脓血、肛门灼热为热痢特征。"]},
  {id:362, name:"桃花汤", category:"金匮要略-呕吐哕下利", composition:[{drug:"赤石脂",dose:"一斤（一半全用，一半筛末）"},{drug:"干姜",dose:"一两"},{drug:"粳米",dose:"一升"}], method:"以水七升，煮米令熟，去滓，温服七合，内赤石脂末方寸匕，日三服。若一服愈，余勿服。", original:"下利便脓血者，桃花汤主之。（呕吐哕下利病篇）", keyPoints:["温中涩肠、固脱止痢。","赤石脂涩肠固脱，干姜温中散寒，粳米补虚。","为脾肾阳虚、下利脓血的治法。","下利稀薄、脓血暗滞、腹痛喜温为虚寒痢特征。"]},
  {id:363, name:"乌梅丸", category:"金匮要略-呕吐哕下利", composition:[{drug:"乌梅",dose:"三百枚"},{drug:"细辛",dose:"六两"},{drug:"附子",dose:"六两（炮）"},{drug:"黄连",dose:"一斤"},{drug:"黄柏",dose:"六两"},{drug:"人参",dose:"六两"},{drug:"当归",dose:"四两"},{drug:"桂枝",dose:"六两"},{drug:"干姜",dose:"十两"},{drug:"川椒",dose:"四两"}], method:"上十味，异捣筛，合治之，以苦酒渍乌梅一宿，去核，蒸之五斗米下，饭熟捣成泥，和药令相得，内臼中，与蜜杵二千下，丸如梧桐子大，先食饮服十丸，日三服。", original:"蛔厥者，乌梅丸主之。（呕吐哕下利病篇）", keyPoints:["安蛔止痛、温脏补虚。","乌梅安蛔止痛，川椒细辛辛温杀虫，黄连黄柏苦寒下蛔。","为蛔厥（蛔虫内扰）的治法。","烦闷呕吐、肢厥腹痛为蛔厥特征。"]},
  {id:364, name:"薏苡附子败酱散", category:"金匮要略-疮痈肠痈浸淫", composition:[{drug:"薏苡仁",dose:"十分"},{drug:"附子",dose:"二分"},{drug:"败酱草",dose:"五分"}], method:"杵为散，取方寸匕，以水二升，煎减半，顿服。小便当下。", original:"肠痈之为病，其身甲错，腹皮急，按之濡，如肿状，腹无积聚，身无热，脉数，此为肠内有痈脓，薏苡附子败酱散主之。（疮痈肠痈篇）", keyPoints:["排脓消痈、温阳散结。","薏苡仁排脓消肿，败酱草清热排脓，附子温阳散结。","为肠痈脓已成、身甲错的治法。","腹皮急、按之濡、如肿状为肠痈特征。"]},
  {id:365, name:"大黄牡丹汤", category:"金匮要略-疮痈肠痈浸淫", composition:[{drug:"大黄",dose:"四两"},{drug:"牡丹",dose:"一两"},{drug:"桃仁",dose:"五十个"},{drug:"瓜子",dose:"半升"},{drug:"芒硝",dose:"三合"}], method:"以水六升，煮取一升，去滓，内芒硝，再煎沸，顿服之。有脓当下；如无脓，当下血。", original:"肠痈者，少腹肿痞，按之即痛如淋，小便自调，时时发热，自汗出，复恶寒。其脉迟紧者，脓未成，可下之，当有血。脉洪数者，脓已成，不可下也。大黄牡丹汤主之。（疮痈肠痈篇）", keyPoints:["泻热破瘀、散结消痈。","大黄芒硝泻热通腑，丹皮桃仁活血化瘀，瓜子排脓。","为肠痈未成脓的治法，症见少腹肿痞、按痛、发热恶寒。","脉迟紧为脓未成，脉洪数为脓已成。"]},
  {id:366, name:"王不留行散", category:"金匮要略-疮痈肠痈浸淫", composition:[{drug:"王不留行",dose:"十分"},{drug:"蒴藋细叶",dose:"十分"},{drug:"桑东南根",dose:"十分"},{drug:"黄芩",dose:"二分"},{drug:"芍药",dose:"二分"},{drug:"厚朴",dose:"二分"},{drug:"甘草",dose:"十八分"},{drug:"干姜",dose:"二分"},{drug:"川椒",dose:"三分"}], method:"上九味，桑根皮以上三味烧灰存性，勿令灰过，各别杵筛，合治之为散，服方寸匕。小疮即粉之，大疮但服之。", original:"病金疮，王不留行散主之。（疮痈肠痈篇）", keyPoints:["活血止血、续筋接骨。","王不留行活血通经，蒴藋桑根接骨续筋，川椒厚朴行气止痛。","为金疮（刀斧伤）出血不止的治法。","小伤外敷，大伤内服。"]},
  {id:367, name:"排脓散", category:"金匮要略-疮痈肠痈浸淫", composition:[{drug:"枳实",dose:"十六枚"},{drug:"芍药",dose:"六分"},{drug:"桔梗",dose:"二分"}], method:"上三味，杵为散，取鸡子黄一枚，以药散与鸡黄相等，揉和令相得，饮和服之，日一服。", original:"排脓散方（附于肠痈方后）。（疮痈肠痈篇）", keyPoints:["排脓消痈、行气活血。","枳实破气散结，芍药活血，桔梗排脓。","为痈脓已成、宜排脓的治法。","可与薏苡附子败酱散交替使用。"]},
  {id:368, name:"排脓汤", category:"金匮要略-疮痈肠痈浸淫", composition:[{drug:"甘草",dose:"二两"},{drug:"桔梗",dose:"一两"},{drug:"生姜",dose:"一两"},{drug:"大枣",dose:"十枚"}], method:"以水三升，煮取一升，温服五合，日再服。", original:"排脓汤方（附于肠痈方后）。（疮痈肠痈篇）", keyPoints:["排脓解毒、调和气血。","甘草解毒，桔梗排脓，姜枣调和气血。","为痈脓在肺胃的治法。","尤适用于肺痈、胃痈。"]},
  {id:369, name:"黄连粉", category:"金匮要略-疮痈肠痈浸淫", composition:[{drug:"黄连",dose:"十分"},{drug:"甘草",dose:"十分"}], method:"（方未见，或为黄连一味研粉外用）", original:"浸淫疮，从口起流向四肢者可治，从四肢流来入口者不可治。浸淫疮，黄连粉主之。（疮痈肠痈篇）", keyPoints:["清热燥湿、解毒止痒。","黄连清热燥湿解毒。","为浸淫疮（湿疹）的治法。","外用黄连粉涂擦患处。"]},
  {id:370, name:"鸡屎白散", category:"金匮要略-趺蹶手指臂肿", composition:[{drug:"鸡屎白",dose:"（取白者）"}], method:"为散，取方寸匕，以水六合，和温服。", original:"转筋之为病，其人臂脚直，脉上下行，微弦。转筋入腹者，鸡屎白散主之。（蛔虫篇）", keyPoints:["清热祛湿、舒筋活络。","鸡屎白清热祛湿、舒筋活络。","为转筋（腓肠肌痉挛）的治法。","脉上下行、微弦为转筋特征。"]},
  {id:371, name:"蜘蛛散", category:"金匮要略-趺蹶手指臂肿", composition:[{drug:"蜘蛛",dose:"十四枚（熬焦）"},{drug:"桂枝",dose:"半两"}], method:"上二味，为散，取八分一匕，饮和服，日再服。蜜丸亦可。", original:"阴狐疝气者，偏有小大，时时上下，蜘蛛散主之。（蛔虫篇）", keyPoints:["散结通络、化气止痛。","蜘蛛散结通络，桂枝化气止痛。","为阴狐疝（腹股沟斜疝）的治法。","时上时下、偏有大小为狐疝特征。"]},
  {id:372, name:"甘草粉蜜汤", category:"金匮要略-趺蹶手指臂肿", composition:[{drug:"甘草",dose:"二两"},{drug:"米粉",dose:"一两"},{drug:"白蜜",dose:"四两"}], method:"以水三升，先煮甘草，取二升，去滓，内粉蜜，搅令和，煎如薄粥，温服一升。", original:"蛔虫之为病，令人吐涎，心痛发作有时，毒药不止，甘草粉蜜汤主之。（蛔虫篇）", keyPoints:["安蛔缓急、和中补虚。","甘草白蜜甘缓安蛔，米粉补虚和中。","为蛔虫病用过毒药杀虫后仍痛不止的治法。","吐涎、心痛、发作有时为蛔虫特征。"]},
  {id:373, name:"桂枝茯苓丸", category:"金匮要略-妇人妊娠", composition:[{drug:"桂枝",dose:"等分"},{drug:"茯苓",dose:"等分"},{drug:"牡丹",dose:"等分"},{drug:"桃仁",dose:"等分"},{drug:"芍药",dose:"等分"}], method:"上五味，末之，炼蜜和丸如兔屎大，每日食前服一丸。不知，加至三丸。", original:"妇人宿有癥病，经断未及三月，而得漏下不止，胎动在脐上者，为癥痼害。妊娠六月动者，前三月经水利时，胎也。下血者，后断三月衃也。所以血不止者，其癥不去故也，当下其癥，桂枝茯苓丸主之。（妇人妊娠篇）", keyPoints:["活血化瘀、消癥散结。","桂枝温通，茯苓健脾，桃仁丹皮活血，芍药养血。","为妊娠有癥病、下血不止的治法。","下其癥而不伤胎，为消癥保胎之法。"]},
  {id:374, name:"附子汤", category:"金匮要略-妇人妊娠", composition:[{drug:"附子",dose:"二枚（炮）"},{drug:"茯苓",dose:"三两"},{drug:"人参",dose:"二两"},{drug:"白术",dose:"四两"},{drug:"芍药",dose:"三两"}], method:"以水八升，煮取三升，去滓，温服一升，日三服。", original:"妇人怀妊六七月，脉弦发热，其胎愈胀，腹痛恶寒者，少腹如扇，所以然者，子藏开放故也，当以附子汤温其藏。（妇人妊娠篇）", keyPoints:["温经散寒、暖宫安胎。","附子温肾散寒，白术茯苓健脾，芍药人参养血。","为妊娠阳虚寒盛、腹痛恶寒的治法。","脉弦、胎胀、腹痛恶寒为阳虚宫寒特征。"]},
  {id:375, name:"芎归胶艾汤", category:"金匮要略-妇人妊娠", composition:[{drug:"川芎",dose:"二两"},{drug:"阿胶",dose:"二两"},{drug:"甘草",dose:"二两"},{drug:"艾叶",dose:"三两"},{drug:"当归",dose:"三两"},{drug:"芍药",dose:"四两"},{drug:"干地黄",dose:"六两"}], method:"以水五升，清酒三升，合煮取三升，去滓，内胶令消尽，温服一升，日三服。不瘥，更作。", original:"妇人有漏下者，有半产后因续下血都不绝者，有妊娠下血者，假令妊娠腹中痛，为胞阻，胶艾汤主之。（妇人妊娠篇）", keyPoints:["养血止血、调经安胎。","阿胶地黄养血止血，艾叶温经止血，川芎当归芍药活血调经。","为妇人冲任虚寒、下血不止的治法。","漏下、半产下血、妊娠腹痛下血均可用。"]},
  {id:376, name:"当归芍药散", category:"金匮要略-妇人妊娠", composition:[{drug:"当归",dose:"三两"},{drug:"芍药",dose:"一斤"},{drug:"川芎",dose:"半斤"},{drug:"茯苓",dose:"四两"},{drug:"白术",dose:"四两"},{drug:"泽泻",dose:"半斤"}], method:"上六味，杵为散，取方寸匕，酒和，日三服。", original:"妇人怀妊，腹中疞痛，当归芍药散主之。（妇人妊娠篇）", keyPoints:["养血疏肝、健脾利湿。","当归川芎养血疏肝，芍药缓急止痛，茯苓白术泽泻健脾利湿。","为妊娠肝脾不调、腹痛的治法。","腹中拘急、绵绵作痛为肝血不足、脾虚湿困。"]},
  {id:377, name:"干姜人参半夏丸", category:"金匮要略-妇人妊娠", composition:[{drug:"干姜",dose:"一两"},{drug:"人参",dose:"一两半"},{drug:"半夏",dose:"二两"}], method:"上三味，末之，以生姜汁糊为丸，如梧桐子大，饮服十丸，日三服。", original:"妊娠呕吐不止，干姜人参半夏丸主之。（妇人妊娠篇）", keyPoints:["温中降逆、和胃止呕。","干姜温中散寒，人参补虚，半夏降逆和胃。","为妊娠虚寒呕吐不止的治法。","呕吐清涎、口淡不渴为脾胃虚寒。"]},
  {id:378, name:"当归贝母苦参丸", category:"金匮要略-妇人妊娠", composition:[{drug:"当归",dose:"四两"},{drug:"贝母",dose:"四两"},{drug:"苦参",dose:"四两"}], method:"上三味，末之，炼蜜和丸如小豆大，饮服三丸，加至十丸。", original:"妊娠小便难，饮食如故，当归贝母苦参丸主之。（妇人妊娠篇）", keyPoints:["养血润燥、清热通淋。","当归养血润燥，贝母清热散结，苦参清热燥湿通淋。","为妊娠血虚燥热、小便难的治法。","小便难但饮食如故，病在下焦。"]},
  {id:379, name:"葵子茯苓散", category:"金匮要略-妇人妊娠", composition:[{drug:"葵子",dose:"一斤"},{drug:"茯苓",dose:"三两"}], method:"杵为散，饮服方寸匕，日三服，小便利则愈。", original:"妊娠有水气，身重小便不利，洒淅恶寒，起则头眩，葵子茯苓散主之。（妇人妊娠篇）", keyPoints:["利水渗湿、通阳消肿。","葵子滑利通窍，茯苓利水渗湿。","为妊娠水气、身重小便不利的治法。","身重恶寒、起则头眩为水气浸渍。"]},
  {id:380, name:"当归散", category:"金匮要略-妇人妊娠", composition:[{drug:"当归",dose:"一斤"},{drug:"川芎",dose:"一斤"},{drug:"芍药",dose:"一斤"},{drug:"黄芩",dose:"一斤"},{drug:"白术",dose:"半斤"}], method:"上五味，杵为散，酒饮服方寸匕，日再服。妊娠常服即易产，胎无苦疾，产后百病悉主之。", original:"妇人妊娠，宜常服当归散。（妇人妊娠篇）", keyPoints:["养血清热、健脾安胎。","当归川芎芍药养血柔肝，黄芩清热安胎，白术健脾。","为妊娠常服之养胎方。","妊娠期可常服此方养血清热。"]},
  {id:381, name:"白术散", category:"金匮要略-妇人妊娠", composition:[{drug:"白术",dose:"四分"},{drug:"川芎",dose:"四分"},{drug:"蜀椒",dose:"三分"},{drug:"牡蛎",dose:"二分"}], method:"上四味，杵为散，酒服一钱匕，日三服，夜一服。但苦痛，加芍药；心下毒痛，倍加川芎。", original:"妊娠养胎，白术散主之。（妇人妊娠篇）", keyPoints:["温中健脾、养血安胎。","白术健脾，川芎养血，蜀椒温中，牡蛎安胎。","为妊娠养胎之温中方。","适于脾胃虚寒、血虚之妊娠。"]},
  {id:382, name:"小柴胡汤", category:"金匮要略-妇人产后", composition:[{drug:"柴胡",dose:"半斤"},{drug:"黄芩",dose:"三两"},{drug:"人参",dose:"三两"},{drug:"甘草",dose:"三两"},{drug:"半夏",dose:"半升"},{drug:"生姜",dose:"三两"},{drug:"大枣",dose:"十二枚"}], method:"以水一斗二升，煮取六升，去滓，再煎取三升，温服一升，日三服。", original:"产妇郁冒，其脉微弱，呕不能食，大便反坚，但头汗出。所以然者，血虚而厥，厥而必冒。冒家欲解，必大汗出。大便坚，呕不能食，小柴胡汤主之。（妇人产后篇）", keyPoints:["和解少阳、扶正达邪。","小柴胡汤疏解少阳，扶正祛邪。","为产后郁冒（血虚厥逆）的治法。","脉微弱、呕不能食、头汗出为产后血虚阳厥。"]},
  {id:383, name:"大承气汤", category:"金匮要略-妇人产后", composition:[{drug:"大黄",dose:"四两（酒洗）"},{drug:"厚朴",dose:"半斤"},{drug:"枳实",dose:"五枚"},{drug:"芒硝",dose:"三合"}], method:"以水一斗，先煮二物，取五升，去滓，内大黄，煮取二升，去滓，内芒硝，更上微火煮令沸，分温再服。", original:"病解能食，七八日更发热者，此为胃实，大承气汤主之。（妇人产后篇）", keyPoints:["峻下热结。","大黄泻热通腑，芒硝软坚，枳实厚朴行气破滞。","为产后胃实发热的治法。","病解能食、七八日后复发热为胃家实。"]},
  {id:384, name:"当归生姜羊肉汤", category:"金匮要略-妇人产后", composition:[{drug:"当归",dose:"三两"},{drug:"生姜",dose:"五两"},{drug:"羊肉",dose:"一斤"}], method:"上三味，以水八升，煮取三升，温服七合，日三服。", original:"产后腹中疞痛，当归生姜羊肉汤主之，并治腹中寒疝，虚劳不足。（妇人产后篇）", keyPoints:["温中补虚、散寒止痛。","当归活血养血，生姜温中散寒，羊肉温补虚损。","为产后血虚寒凝、腹痛的治法。","腹中拘急、绵绵作痛、喜温喜按为特征。"]},
  {id:385, name:"下瘀血汤", category:"金匮要略-妇人产后", composition:[{drug:"大黄",dose:"二两"},{drug:"桃仁",dose:"二十枚"},{drug:"蟅虫",dose:"二十枚（熬，去足）"}], method:"上三味，末之，炼蜜和为四丸，以酒一升，煎一丸，取八合，顿服之，新血下如豚肝。", original:"产妇腹痛，法当以枳实芍药散，假令不愈者，此为腹中有干血着脐下，宜下瘀血汤主之。（妇人产后篇）", keyPoints:["破血逐瘀、下瘀止血。","大黄桃仁活血化瘀，蟅虫破血逐瘀。","为产后瘀血内停、着脐下的治法。","新血下如豚肝为瘀血下行之征。"]},
  {id:386, name:"竹叶汤", category:"金匮要略-妇人产后", composition:[{drug:"竹叶",dose:"一把"},{drug:"葛根",dose:"三两"},{drug:"防风",dose:"一两"},{drug:"桔梗",dose:"一两"},{drug:"桂枝",dose:"一两"},{drug:"人参",dose:"一两"},{drug:"甘草",dose:"一两"},{drug:"附子",dose:"一枚（炮）"},{drug:"大枣",dose:"十五枚"},{drug:"生姜",dose:"五两"}], method:"以水一斗，煮取二升半，分温三服，温覆使汗出。", original:"产后中风，发热，面正赤，喘而头痛，竹叶汤主之。（妇人产后篇）", keyPoints:["扶正祛邪、疏风清热。","竹叶葛根防风疏风清热，桂枝人参附子扶正温阳。","为产后中风、正虚邪实的治法。","发热面赤、喘而头痛为产后虚中夹风。"]},
  {id:387, name:"竹皮大丸", category:"金匮要略-妇人产后", composition:[{drug:"生竹茹",dose:"二分"},{drug:"石膏",dose:"二分"},{drug:"桂枝",dose:"一分"},{drug:"甘草",dose:"七分"},{drug:"白薇",dose:"一分"}], method:"上五味，末之，枣肉和丸弹子大，以饮服一丸，日三夜二服。", original:"妇人乳中虚，烦乱呕逆，安中益气，竹皮大丸主之。（妇人产后篇）", keyPoints:["清热降逆、安中益气。","竹茹清热止呕，石膏清热，桂枝平冲，甘草白薇益气清热。","为产后虚热烦乱、呕逆的治法。","烦乱呕逆、虚热内生为产后虚热证。"]},
  {id:388, name:"白头翁加甘草阿胶汤", category:"金匮要略-妇人产后", composition:[{drug:"白头翁",dose:"二两"},{drug:"黄连",dose:"三两"},{drug:"黄柏",dose:"三两"},{drug:"秦皮",dose:"三两"},{drug:"甘草",dose:"二两"},{drug:"阿胶",dose:"二两"}], method:"上六味，以水七升，煮取二升半，内胶令消尽，分温三服。", original:"产后下利虚极，白头翁加甘草阿胶汤主之。（妇人产后篇）", keyPoints:["清热燥湿、养血止血。","白头翁汤清热止痢，加甘草阿胶养血补虚。","为产后热利伤阴、气血两虚的治法。","产后下利、气血两虚、阴伤为特征。"]},
  {id:389, name:"半夏厚朴汤", category:"金匮要略-妇人杂病", composition:[{drug:"半夏",dose:"一升"},{drug:"厚朴",dose:"三两"},{drug:"生姜",dose:"五两"},{drug:"干苏叶",dose:"二两"},{drug:"茯苓",dose:"四两"}], method:"以水七升，煮取四升，分温四服，日三夜一服。", original:"妇人咽中如有炙脔，半夏厚朴汤主之。（妇人杂病篇）", keyPoints:["疏肝解郁、降逆化痰。","半夏厚朴生姜降逆化痰，茯苓健脾，苏叶疏肝。","为梅核气（咽中如有炙脔）的治法。","咽中异物感、咯之不出、吞之不下为特征。"]},
  {id:390, name:"甘麦大枣汤", category:"金匮要略-妇人杂病", composition:[{drug:"甘草",dose:"三两"},{drug:"小麦",dose:"一升"},{drug:"大枣",dose:"十枚"}], method:"以水六升，煮取三升，温分三服。", original:"妇人脏躁，喜悲伤欲哭，像如神灵所作，数欠伸，甘麦大枣汤主之。（妇人杂病篇）", keyPoints:["养心安神、甘缓和中。","小麦养心除烦，甘草大枣甘缓和中。","为脏躁（精神恍惚、悲伤欲哭）的治法。","喜悲伤欲哭、数欠伸为脏躁特征。"]},
  {id:391, name:"温经汤", category:"金匮要略-妇人杂病", composition:[{drug:"吴茱萸",dose:"三两"},{drug:"当归",dose:"二两"},{drug:"川芎",dose:"二两"},{drug:"芍药",dose:"二两"},{drug:"人参",dose:"二两"},{drug:"桂枝",dose:"二两"},{drug:"阿胶",dose:"二两"},{drug:"牡丹皮",dose:"二两"},{drug:"生姜",dose:"二两"},{drug:"甘草",dose:"二两"},{drug:"半夏",dose:"半升"},{drug:"麦门冬",dose:"一升"}], method:"以水一斗，煮取三升，分温三服。", original:"问曰：妇人年五十所，病下利数十日不止，暮即发热，少腹里急，腹满，手掌烦热，唇口干燥，何也？师曰：此病属带下。何以故？曾经半产，瘀血在少腹不去。当以温经汤主之。（妇人杂病篇）", keyPoints:["温经散寒、养血祛瘀。","吴茱萸桂枝温经散寒，当归川芎芍药阿胶养血，丹皮活血，麦冬半夏润燥。","为冲任虚寒、瘀血内停之带下病的治法。","下利数十日、暮发热、唇口干燥为瘀血在少腹。"]},
  {id:392, name:"土瓜根散", category:"金匮要略-妇人杂病", composition:[{drug:"土瓜根",dose:"三分"},{drug:"芍药",dose:"三分"},{drug:"桂枝",dose:"三分"},{drug:"蟅虫",dose:"三分"}], method:"上四味，杵为散，酒服方寸匕，日三服。", original:"带下经水不利，少腹满痛，经一月再见者，土瓜根散主之。（妇人杂病篇）", keyPoints:["活血通经、散瘀止痛。","土瓜根清热通经，桂枝芍药活血，蟅虫破瘀。","为瘀血内阻、月经不利的治法。","少腹满痛、经水不利或一月再见为瘀血。"]},
  {id:393, name:"大黄甘遂汤", category:"金匮要略-妇人杂病", composition:[{drug:"大黄",dose:"四两"},{drug:"甘遂",dose:"二两"},{drug:"阿胶",dose:"二两"}], method:"以水三升，煮取一升，顿服之，其血当下。", original:"妇人少腹满如敦状，小便微难而不渴，生后者，此为水与血俱结在血室也，大黄甘遂汤主之。（妇人杂病篇）", keyPoints:["攻瘀逐水。","大黄攻瘀，甘遂逐水，阿胶养血扶正。","为产后水血俱结血室的治法。","少腹满如敦状、小便微难为水血俱结。"]},
  {id:394, name:"抵当汤", category:"金匮要略-妇人杂病", composition:[{drug:"水蛭",dose:"三十个（熬）"},{drug:"虻虫",dose:"三十个（熬，去翅足）"},{drug:"桃仁",dose:"二十个（去皮尖）"},{drug:"大黄",dose:"三两（酒浸）"}], method:"上四味，为末，以水五升，煮取三升，去滓，温服一升。", original:"妇人经水不利下，抵当汤主之。（妇人杂病篇）", keyPoints:["破血逐瘀、通经下血。","水蛭虻虫破血逐瘀，桃仁大黄活血通经。","为瘀血内阻、经闭不行的治法。","经水不利下、少腹硬满为瘀血重证。"]},
  {id:395, name:"矾石丸", category:"金匮要略-妇人杂病", composition:[{drug:"矾石",dose:"三分（烧）"},{drug:"杏仁",dose:"一分"}], method:"上二味，末之，炼蜜和丸枣核大，内脏中，剧者再内之。", original:"妇人经水闭不利，脏坚癖不止，中有干血，下白物，矾石丸主之。（妇人杂病篇）", keyPoints:["燥湿止带、化瘀敛疮。","矾石燥湿止带，杏仁润燥。","为妇人带下、脏坚癖（下腹部肿块）的治法。","内有干血、外见白带为特征。"]},
  {id:396, name:"蛇床子散", category:"金匮要略-妇人杂病", composition:[{drug:"蛇床子",dose:"（研末）"}], method:"为末，以白粉少许，和合相得，如枣大，绵裹内之，自然温。", original:"妇人阴寒，温阴中坐药，蛇床子散主之。（妇人杂病篇）", keyPoints:["温阳散寒、燥湿止痒。","蛇床子温肾散寒、燥湿杀虫。","为妇人阴寒、阴痒的坐药。","外用纳阴中，温阳散寒止痒。"]},
  {id:397, name:"狼牙汤", category:"金匮要略-妇人杂病", composition:[{drug:"狼牙",dose:"三两"}], method:"以水四升，煮取五合，用绵缠箸如茧，浸汤沥阴中，日四遍。", original:"妇人阴中蚀疮烂者，狼牙汤洗之。（妇人杂病篇）", keyPoints:["清热燥湿、解毒杀虫。","狼牙清热燥湿、解毒杀虫。","为妇人阴疮（外阴溃疡）的外洗方。","阴中蚀疮、溃烂为湿热下注。"]},

  {id:399, name:"红蓝花酒", category:"金匮要略-妇人杂病", composition:[{drug:"红蓝花",dose:"一两"}], method:"上一味，以酒一大升，煎减半，顿服一半，未止再服。", original:"妇人六十二种风，及腹中血气刺痛，红蓝花酒主之。（妇人杂病篇）", keyPoints:["活血止痛、祛风通络。","红蓝花（红花）活血祛瘀止痛。","为妇人血风、血气刺痛的治法。","腹中刺痛、游走不定为血风。"]}

];

const LIUJING_ORDER = ['太阳病', '阳明病', '少阳病', '太阴病', '少阴病', '厥阴病'];
const JINKUI_CATS = ["金匮要略-痉湿暍病", "金匮要略-百合狐惑阴阳毒病", "金匮要略-疟病", "金匮要略-中风历节", "金匮要略-血痹虚劳", "金匮要略-肺痿肺痈咳嗽上气", "金匮要略-奔豚气", "金匮要略-胸痹心痛短气", "金匮要略-腹满寒疝宿食", "金匮要略-五脏风寒积聚", "金匮要略-痰饮咳嗽", "金匮要略-消渴小便不利淋病", "金匮要略-水气病", "金匮要略-黄疸病", "金匮要略-惊悸吐衄下血", "金匮要略-呕吐哕下利", "金匮要略-疮痈肠痈浸淫", "金匮要略-趺蹶手指臂肿", "金匮要略-妇人妊娠", "金匮要略-妇人产后", "金匮要略-妇人杂病"];
const OTHER_CATS = ['霍乱', '劳复', '阴阳易'];

// 侧边栏30大分类（与FORMULAS数据一一对应）
const SIDEBAR_CATS = [
    '太阳病', '阳明病', '少阳病', '太阴病', '少阴病', '厥阴病',
    '霍乱', '劳复', '阴阳易',
    '金匮要略-痉湿暍病', '金匮要略-百合狐惑阴阳毒病', '金匮要略-疟病',
    '金匮要略-中风历节', '金匮要略-血痹虚劳', '金匮要略-肺痿肺痈咳嗽上气',
    '金匮要略-奔豚气', '金匮要略-胸痹心痛短气', '金匮要略-腹满寒疝宿食',
    '金匮要略-五脏风寒积聚', '金匮要略-痰饮咳嗽', '金匮要略-消渴小便不利淋病',
    '金匮要略-水气病', '金匮要略-黄疸病', '金匮要略-惊悸吐衄下血',
    '金匮要略-呕吐哕下利', '金匮要略-疮痈肠痈浸淫', '金匮要略-趺蹶手指臂肿',
    '金匮要略-妇人妊娠', '金匮要略-妇人产后', '金匮要略-妇人杂病'
];

const $ = function(s) { return document.querySelector(s); };

const state = { sidebarKeyword: "", openCats: { '太阳病': true } };

function escHtml(s) {
    if (s == null) return '';
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
}

function renderList() {
    const list = FORMULAS;
    $('#statsBar').innerHTML = '共 <strong>' + FORMULAS.length + '</strong> 首方';

    // 按分类分组
    const grouped = {};
    for (let i = 0; i < list.length; i++) {
        const f = list[i];
        if (!grouped[f.category]) grouped[f.category] = [];
        grouped[f.category].push(f);
    }

    // 按六经顺序排列
    const orderedCats = [...LIUJING_ORDER, ...JINKUI_CATS, ...OTHER_CATS].filter(c => grouped[c]);
    for (const c in grouped) {
        if (orderedCats.indexOf(c) === -1) orderedCats.push(c);
    }

    let html = '';
    if (list.length === 0) {
        html = '<div class="no-match">未找到匹配的方剂，试试其他关键词。</div>';
    } else {
        for (let ci = 0; ci < orderedCats.length; ci++) {
            const cat = orderedCats[ci];
            const items = grouped[cat].sort(function(a, b) { return a.id - b.id; });
            html += '<div class="section-title">' + cat + '<span class="section-subtitle">（' + items.length + '首）</span></div>';
            html += '<div class="formula-list">';
            for (let i = 0; i < items.length; i++) {
                const f = items[i];
                const drugs = f.composition.slice(0, 4).map(function(x) { return x.drug; }).join('、');
                const more = f.composition.length > 4 ? ' 等' + f.composition.length + '味' : '';
                html +=
                    '<div class="formula-item" data-id="' + f.id + '">' +
                    '<span class="formula-num">#' + f.id + '</span>' +
                    '<div class="formula-name">' + escHtml(f.name) + '</div>' +
                    '<div class="formula-composition">' + escHtml(drugs + more) + '</div>' +
                    '</div>';
            }
            html += '</div>';
        }
    }

    $('#mainList').innerHTML = html;
    const items = document.querySelectorAll('.formula-item');
    for (let j = 0; j < items.length; j++) {
        items[j].addEventListener('click', function() {
            const id = parseInt(this.getAttribute('data-id'), 10);
            showDetail(id);
        });
    }
}

function showDetail(id) {
    let f = null;
    for (let i = 0; i < FORMULAS.length; i++) {
        if (FORMULAS[i].id === id) { f = FORMULAS[i]; break; }
    }
    if (!f) return;

    let comps = '';
    for (let i = 0; i < f.composition.length; i++) {
        const c = f.composition[i];
        comps += '<li><span class="drug-name">' + escHtml(c.drug) + '</span><span class="drug-dose">' + escHtml(c.dose || '—') + '</span></li>';
    }
    let points = '';
    for (let j = 0; j < f.keyPoints.length; j++) {
        points += '<div class="point-item">' + escHtml(f.keyPoints[j]) + '</div>';
    }

    const detailsHtml =
        '<div class="formula-details">' +
        '<button class="close-btn" id="closeDetail">✕ 关闭</button>' +
        '<div class="detail-header">' +
        '<div class="detail-id">第 ' + f.id + ' 方 · 伤寒论</div>' +
        '<h2 class="detail-title">' + escHtml(f.name) + '</h2>' +
        '<span class="detail-cat">' + escHtml(f.category) + '</span>' +
        '</div>' +
        '<div class="detail-section">' +
        '<div class="detail-section-title">药物组成</div>' +
        '<ul class="drug-list">' + comps + '</ul>' +
        '</div>' +
        '<div class="detail-section">' +
        '<div class="detail-section-title">煎服方法</div>' +
        '<div class="detail-content">' + escHtml(f.method || '原文未详') + '</div>' +
        '</div>' +
        '<div class="detail-section">' +
        '<div class="detail-section-title">伤寒原文</div>' +
        '<div class="detail-content">' + escHtml(f.original || '—') + '</div>' +
        '</div>' +
        '<div class="detail-section">' +
        '<div class="detail-section-title">倪海厦讲解要点</div>' +
        points +
        '</div>' +
        '</div>';

    const container = $('#detailsContainer');
    container.innerHTML = detailsHtml;
    container.classList.remove('hidden');
    $('#closeDetail').addEventListener('click', function() {
        container.innerHTML = '';
        container.classList.add('hidden');
    });
    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function bind() {
    $('#sidebarSearch').addEventListener('input', function(e) {
        state.sidebarKeyword = e.target.value;
        renderSidebar();
    });
}

function getSidebarFormulas() {
    const k = state.sidebarKeyword.trim().toLowerCase();
    return FORMULAS.filter(function(f) {
        if (!k) return true;
        let drugs = '';
        for (let i = 0; i < f.composition.length; i++) drugs += f.composition[i].drug + ' ';
        const hay = (f.name + ' ' + drugs + ' ' + f.keyPoints.join(' ') + ' ' + f.original + ' ' + f.category).toLowerCase();
        return hay.indexOf(k) !== -1;
    });
}

function renderSidebar() {
    const list = getSidebarFormulas();
    const grouped = {};
    for (let i = 0; i < SIDEBAR_CATS.length; i++) grouped[SIDEBAR_CATS[i]] = [];
    for (let i = 0; i < list.length; i++) {
        const f = list[i];
        grouped[f.category].push(f);
    }

    let html = '';
    for (let i = 0; i < SIDEBAR_CATS.length; i++) {
        const cat = SIDEBAR_CATS[i];
        const items = grouped[cat].sort(function(a, b) { return a.id - b.id; });
        if (state.sidebarKeyword && items.length === 0) continue;
        const isOpen = state.sidebarKeyword ? true : !!state.openCats[cat];
        html += '<div class="cat-group' + (isOpen ? ' open' : '') + '" data-cat="' + escHtml(cat) + '">';
        html += '<div class="cat-title" data-toggle="' + escHtml(cat) + '">';
        html += '<span>' + escHtml(cat) + '<span class="cat-count">（' + items.length + '）</span></span>';
        html += '<span class="cat-arrow">▶</span>';
        html += '</div>';
        html += '<ul class="cat-items">';
        for (let j = 0; j < items.length; j++) {
            const f = items[j];
            html += '<li class="cat-item" data-id="' + f.id + '">';
            html += '<span class="item-id">#' + f.id + '</span>';
            html += '<span>' + escHtml(f.name) + '</span>';
            html += '</li>';
        }
        html += '</ul></div>';
    }
    if (!html) html = '<div class="no-match" style="padding:20px;font-size:13px;">无匹配方剂</div>';
    $('#sidebarBody').innerHTML = html;

    const titles = document.querySelectorAll('#sidebarBody .cat-title');
    for (let i = 0; i < titles.length; i++) {
        titles[i].addEventListener('click', function() {
            const cat = this.getAttribute('data-toggle');
            state.openCats[cat] = !state.openCats[cat];
            renderSidebar();
        });
    }
    const items = document.querySelectorAll('#sidebarBody .cat-item');
    for (let j = 0; j < items.length; j++) {
        items[j].addEventListener('click', function(e) {
            e.stopPropagation();
            const id = parseInt(this.getAttribute('data-id'), 10);
            // 在右侧主区域显示详情
            showDetail(id);
        });
    }
}

function init() {
    bind();
    renderList();
    renderSidebar();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
